// AI — Claude via Anthropic API
async function getClaudeChoice(game, history) {
  try {
    const historyStr = history.length > 0
      ? "Previous rounds: " + history.map((h, i) => `Round ${i+1}: human=${h.mine}, AI=${h.opp}`).join("; ")
      : "This is the first round.";
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are playing a game theory game called "${game.name}" against a human student.
Available strategies: ${game.strategies.join(", ")}
OUTCOME matrix (grades, NOT payoffs):
  α,α → B−, B−
  α,β → A, C  
  β,α → C, A
  β,β → B+, B+
IMPORTANT: These are OUTCOMES (grades), not payoffs. The payoffs depend on PREFERENCES. 
${historyStr}
You must decide what kind of player you are and choose accordingly.
Respond in EXACTLY this JSON format, nothing else:
{"choice":"α or β","reasoning_cn":"2-4句中文。","reasoning_en":"2-4 sentences in English."}`
        }]
      })
    });
    const data = await response.json();
    const text = (data.content?.[0]?.text || "").trim();
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (game.strategies.includes(parsed.choice)) {
        return { choice: parsed.choice, reasoningCN: parsed.reasoning_cn, reasoningEN: parsed.reasoning_en };
      }
    } catch {}
    for (const s of game.strategies) {
      if (text.includes(s)) return { choice: s, reasoningCN: "AI选择了策略 " + s, reasoningEN: "AI chose strategy " + s };
    }
    return { choice: game.strategies[0], reasoningCN: "（分析不可用）", reasoningEN: "(Analysis unavailable)" };
  } catch (e) {
    console.error("Claude API error:", e);
    const fallback = game.strategies[Math.floor(Math.random() * game.strategies.length)];
    return { choice: fallback, reasoningCN: "（API连接失败，随机选择）", reasoningEN: "(API connection failed, random choice)" };
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    if (!firebaseReady || !ultRound) return;
    const snap = await db.ref(`games/ultimatum/rounds/${ultRound}/submissions`).once("value");
    const subs = snap.val();
    if (!subs) { alert("没有提交 No submissions!"); return; }

    const entries = Object.entries(subs);
    const oSubs = shuffle(entries.filter(([_, v]) => v.role === "O"));
    const rSubs = shuffle(entries.filter(([_, v]) => v.role === "R"));

    if (oSubs.length === 0 || rSubs.length === 0) {
      alert("需要至少一个Offerer和一个Responder! Need at least one of each role!");
      return;
    }

    // Match: pair each with a random opponent (cycle if unequal sizes)
    const playerResults = {};
    let accepted = 0, rejected = 0;
    const matchLog = [];

    // Match every Offerer with a random Responder
    for (const [oId, oData] of oSubs) {
      const randR = rSubs[Math.floor(Math.random() * rSubs.length)];
      const [rId, rData] = randR;
      const offer = oData.value;
      const threshold = rData.value;
      const isAccepted = offer >= threshold;
      const oPay = isAccepted ? (100 - offer) : 0;
      const rPay = isAccepted ? offer : 0;
      if (isAccepted) accepted++; else rejected++;
      matchLog.push({ offer, threshold, accepted: isAccepted });
      playerResults[oId] = {
        myRole: "O", myValue: offer, oppValue: threshold,
        oppName: rData.name, accepted: isAccepted,
        myPayoff: oPay, oppPayoff: rPay,
      };
    }
    // Match every Responder with a random Offerer
    for (const [rId, rData] of rSubs) {
      const randO = oSubs[Math.floor(Math.random() * oSubs.length)];
      const [oId, oData] = randO;
      const offer = oData.value;
      const threshold = rData.value;
      const isAccepted = offer >= threshold;
      const oPay = isAccepted ? (100 - offer) : 0;
      const rPay = isAccepted ? offer : 0;
      playerResults[rId] = {
        myRole: "R", myValue: threshold, oppValue: offer,
        oppName: oData.name, accepted: isAccepted,
        myPayoff: rPay, oppPayoff: oPay,
      };
    }

    // Stats

    const thresholds = rSubs.map(([_, v]) => v.value);

      acceptRate: Math.round(accepted / (accepted + rejected) * 100),
      oCount: oSubs.length, rCount: rSubs.length,
      matches: accepted + rejected,
    };

    updates[`games/ultimatum/rounds/${ultRound}/stats`] = statsData;

      color: primary ? "white" : C.TEXT2, border: primary ? "none" : `1px solid ${C.DIM}40`, ...style,
    }} {...props}>{children}</button>
  );

  // Nash payoff matrix component
  const NashMatrix = ({ highlightRole, small }) => {
    const sz = small ? 11 : 13;
    const pad = small ? "5px 4px" : "8px 6px";
    return (
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: sz }}>
        <thead>
          <tr>
            <td style={{ padding: pad, fontWeight: 700, color: C.DIM }}>P1 ╲ P2</td>
            <td style={{ padding: pad, fontWeight: 700, color: C.TEAL, textAlign: "center" }}>L</td>
            <td style={{ padding: pad, fontWeight: 700, color: C.TEAL, textAlign: "center" }}>R</td>
          </tr>
        </thead>
        <tbody>
          {[["U", "1,2", "3,4"], ["M", "4,5", "2,4"], ["D", "5,2", "1,3"]].map(([row, l, r], i) => (
            <tr key={i}>
              <td style={{ padding: pad, fontWeight: 700, color: C.AMBER }}>{row}</td>
              {[l, r].map((cell, j) => (
                  <td key={j} style={{
                    padding: pad, textAlign: "center",
                    background: "transparent",
                    borderRadius: 4, color: C.TEXT,
                  }}>{cell}</td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    );
  };

  // Convergence chart SVG
  const ConvergenceChart = ({ allStats }) => {
    if (allStats.length === 0) return <div style={{ fontSize: 12, color: C.DIM, textAlign: "center", padding: 20 }}>暂无数据 No data yet</div>;
    const W = 320, H = 160, PAD = 36, PADR = 16;
    const maxR = Math.max(...allStats.map(s => s.round), 1);
    const xScale = (r) => PAD + (r - 1) / Math.max(maxR - 1, 1) * (W - PAD - PADR);
    const yScale = (pct) => H - PAD - (pct / 100) * (H - PAD - 12);

    const uLine = allStats.map(s => {
      const total = (s.p1?.total || s.p1?.U + s.p1?.M + s.p1?.D) || 1;
      const pct = ((s.p1?.U || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };
    });
    const rLine = allStats.map(s => {
      const total = (s.p2?.total || s.p2?.L + s.p2?.R) || 1;
      const pct = ((s.p2?.R || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };
    });

    const pathStr = (pts) => pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");

    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", maxWidth: 360 }}>
        {/* Grid */}
        {[0, 25, 50, 75, 100].map(v => (
          <g key={v}>
            <line x1={PAD} y1={yScale(v)} x2={W - PADR} y2={yScale(v)} stroke={`${C.DIM}25`} strokeWidth="0.5" />
            <text x={PAD - 4} y={yScale(v) + 3} textAnchor="end" fontSize="8" fill={C.DIM}>{v}%</text>
          </g>
        ))}
        {/* 100% target line */}
        <line x1={PAD} y1={yScale(100)} x2={W - PADR} y2={yScale(100)} stroke={`${C.TEAL}30`} strokeWidth="1" strokeDasharray="4,3" />
        {/* Lines */}
        {uLine.length > 1 && <path d={pathStr(uLine)} fill="none" stroke={C.AMBER} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
        {rLine.length > 1 && <path d={pathStr(rLine)} fill="none" stroke={C.TEAL} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
        {/* Dots */}
        {uLine.map((p, i) => <circle key={`u${i}`} cx={p.x} cy={p.y} r="4" fill={C.AMBER} />)}
        {rLine.map((p, i) => <circle key={`r${i}`} cx={p.x} cy={p.y} r="4" fill={C.TEAL} />)}
        {/* Labels on last dot */}
        {uLine.length > 0 && <text x={uLine[uLine.length-1].x + 6} y={uLine[uLine.length-1].y + 3} fontSize="9" fontWeight="700" fill={C.AMBER}>{Math.round(uLine[uLine.length-1].pct)}%</text>}
        {rLine.length > 0 && <text x={rLine[rLine.length-1].x + 6} y={rLine[rLine.length-1].y + 3} fontSize="9" fontWeight="700" fill={C.TEAL}>{Math.round(rLine[rLine.length-1].pct)}%</text>}
        {/* X axis labels */}
        {allStats.map((s, i) => (
          <text key={i} x={xScale(s.round)} y={H - 8} textAnchor="middle" fontSize="9" fill={C.DIM}>R{s.round}</text>
        ))}
        {/* Legend */}
        <circle cx={PAD + 4} cy={8} r="3.5" fill={C.AMBER} />
        <text x={PAD + 12} y={11} fontSize="8" fill={C.AMBER} fontWeight="600">P1 chose U</text>
        <circle cx={PAD + 80} cy={8} r="3.5" fill={C.TEAL} />
        <text x={PAD + 88} y={11} fontSize="8" fill={C.TEAL} fontWeight="600">P2 chose R</text>
      </svg>
    );
  };

  // ================================================================
  // SCREENS
  // ================================================================

  // ---- HOME ----
  if (screen === "home") return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG} 0%, #0F1A30 50%, #141E35 100%)` }}>
      <div style={{ position: "absolute", inset: 0, backgroundImage: `linear-gradient(${C.HEADER}08 1px, transparent 1px), linear-gradient(90deg, ${C.HEADER}08 1px, transparent 1px)`, backgroundSize: "40px 40px", pointerEvents: "none" }} />
      <div className="fade-up" style={{ position: "relative", zIndex: 1, textAlign: "center", maxWidth: 400, width: "100%" }}>
        <div style={{ width: 60, height: 60, margin: "0 auto 16px", background: `linear-gradient(135deg, ${C.RED}, ${C.GOLD})`, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, fontWeight: 800, color: "white", boxShadow: `0 8px 32px ${C.RED}40` }}>GT</div>
        <h1 style={{ fontSize: 28, fontWeight: 800, color: C.TEXT, letterSpacing: "-0.02em" }}>Game Theory Lab</h1>
        <p style={{ fontSize: 13, color: C.GOLD, letterSpacing: "0.15em", textTransform: "uppercase", fontWeight: 600, margin: "4px 0 0" }}>ECON2501 · 博弈论实验室</p>
        <p style={{ fontSize: 12, color: C.DIM, margin: "8px 0 28px" }}></p>

        {!firebaseReady && (
          <div style={{ background: `${C.RED}15`, border: `1px solid ${C.RED}40`, borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: "#FF8A80", textAlign: "left" }}>
            ⚠️ Firebase 未配置。人人对战模式不可用。
          </div>
        )}

        <input type="text" placeholder="你的名字 / Your name" value={name} onChange={e => setName(e.target.value)}
          style={{ width: "100%", padding: "13px 16px", fontSize: 15, background: C.SURFACE, border: `1px solid ${C.HEADER}40`, borderRadius: 11, color: C.TEXT, outline: "none", marginBottom: 10 }}
          onFocus={e => e.target.style.borderColor = C.GOLD} onBlur={e => e.target.style.borderColor = `${C.HEADER}40`} />
        <input type="text" placeholder="学号 / Student ID" value={studentId} onChange={e => setStudentId(e.target.value)}
          style={{ width: "100%", padding: "13px 16px", fontSize: 15, background: C.SURFACE, border: `1px solid ${C.HEADER}40`, borderRadius: 11, color: C.TEXT, outline: "none", marginBottom: 16 }}
          onFocus={e => e.target.style.borderColor = C.GOLD} onBlur={e => e.target.style.borderColor = `${C.HEADER}40`} />

        {/* Game buttons — 2x2 grid */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12 }}>
          <button className="btn-press" onClick={() => {
            if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号"); return; }
            setGameId("grade_game"); setMode("human"); setScreen("intro");
          }}
            style={{ padding: "14px 6px", fontSize: 13, fontWeight: 700, background: `linear-gradient(135deg, ${C.HEADER}, ${C.BLUE})`, border: "none", borderRadius: 12, color: "white", cursor: "pointer", opacity: firebaseReady ? 1 : 0.4, boxShadow: `0 4px 20px ${C.BLUE}50` }}
            disabled={!firebaseReady}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>📝</div>
            成绩博弈<br/><span style={{ fontSize: 9, opacity: 0.6, fontWeight: 400 }}>Grade Game</span>
          </button>
          <button className="btn-press" onClick={() => {
            if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号"); return; }
            setScreen("beauty_intro");
          }}
            style={{ padding: "14px 6px", fontSize: 13, fontWeight: 700, background: "linear-gradient(135deg, #2D1B4E, #1B1040)", border: `1px solid #4A307060`, borderRadius: 12, color: "white", cursor: "pointer", opacity: firebaseReady ? 1 : 0.4, boxShadow: "0 4px 20px #2D1B4E50" }}
            disabled={!firebaseReady}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>🏆</div>
            选美博弈<br/><span style={{ fontSize: 9, opacity: 0.6, fontWeight: 400 }}>Beauty Contest</span>
          </button>
          <button className="btn-press" onClick={() => {
            if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号"); return; }
            joinNashGame();
          }}
            style={{ padding: "14px 6px", fontSize: 13, fontWeight: 700, background: `linear-gradient(135deg, ${C.TEAL_DARK}, #0A1F1E)`, border: `1px solid ${C.TEAL}35`, borderRadius: 12, color: "white", cursor: "pointer", opacity: firebaseReady ? 1 : 0.4, boxShadow: `0 4px 20px ${C.TEAL}25` }}
            disabled={!firebaseReady}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>⚖️</div>
            纳什博弈<br/><span style={{ fontSize: 9, opacity: 0.6, fontWeight: 400 }}>Nash Game</span>
          </button>
          <button className="btn-press" onClick={() => {
            if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号"); return; }
            setScreen("invest_intro");
          }}
            style={{ padding: "14px 6px", fontSize: 13, fontWeight: 700, background: "linear-gradient(135deg, #2A2008, #1A1508)", border: `1px solid ${C.GOLD}35`, borderRadius: 12, color: "white", cursor: "pointer", opacity: firebaseReady ? 1 : 0.4, boxShadow: `0 4px 20px ${C.GOLD}20` }}
            disabled={!firebaseReady}>
            <div style={{ fontSize: 18, marginBottom: 2 }}>💰</div>
            投资博弈<br/><span style={{ fontSize: 9, opacity: 0.6, fontWeight: 400 }}>Investment Game</span>
          </button>
        </div>

        {/* 5th game — Ultimatum (Week 7) spans full width */}
        <button className="btn-press" onClick={() => {
          if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号"); return; }
          joinUltimatum();
        }}
          style={{ width: "100%", padding: "14px 6px", fontSize: 13, fontWeight: 700, background: "linear-gradient(135deg, #3A1820, #1F0F18)", border: `1px solid ${C.RED}40`, borderRadius: 12, color: "white", cursor: "pointer", opacity: firebaseReady ? 1 : 0.4, boxShadow: `0 4px 20px ${C.RED}25`, marginBottom: 12 }}
          disabled={!firebaseReady}>
          <span style={{ fontSize: 18, marginRight: 8 }}>🤝</span>
          最后通牒博弈
          <span style={{ fontSize: 10, opacity: 0.65, fontWeight: 400, marginLeft: 8 }}>Ultimatum Bargaining · Week 7</span>
        </button>

        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn-press" onClick={() => {
            const pw = prompt("请输入教师密码:");
            if (pw === "econ2501") { loadStats(); loadNashAllStats(); loadInvestAllResults(); loadUltAllStats(); setScreen("teacher"); }
            else if (pw !== null) alert("密码错误");
          }}
            style={{ flex: 1, padding: 11, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}35`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>
            🎓 教师面板
          </button>
          <button className="btn-press" onClick={() => { loadStats(); setScreen("history"); }}
            style={{ flex: 1, padding: 11, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}35`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>
            📊 历史记录
          </button>
        </div>
      </div>
    </div>
  );

  // ---- GRADE GAME INTRO ----
  if (screen === "intro") {
    const intro = game.intro;
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG} 0%, #0F1A30 100%)`, overflowY: "auto" }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ position: "fixed", top: 14, left: 14, background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", zIndex: 10 }}>← Back 返回</button>
        <div style={{ maxWidth: 420, width: "100%", paddingTop: 30 }}>
          <div className="fade-up" style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 48, marginBottom: 6 }}>{intro.emoji}</div>
            <div style={{ fontSize: 11, color: C.GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4 }}>Week {game.week}</div>
            <h2 style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 2 }}>{game.nameCN}</h2>
            <p style={{ fontSize: 14, color: C.TEXT2 }}>{game.name}</p>
          </div>
          <div className="fade-up fade-up-1" style={{ background: C.SURFACE, borderRadius: 14, padding: 16, border: `1px solid ${C.HEADER}25`, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 8 }}>📖 故事背景 Story</div>
            <p style={{ fontSize: 13, color: C.TEXT, lineHeight: 1.7, marginBottom: 8 }}>{intro.story}</p>
            <p style={{ fontSize: 11, color: C.DIM, lineHeight: 1.5, fontStyle: "italic" }}>{intro.storySub}</p>
          </div>
          <div className="fade-up fade-up-2" style={{ background: C.SURFACE, borderRadius: 14, padding: 16, border: `1px solid ${C.HEADER}25`, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 10 }}>📋 游戏规则 Game Rules</div>
            {intro.rules.map((r, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < intro.rules.length - 1 ? `1px solid ${C.DIM}15` : "none" }}>
                <div style={{ fontSize: 20, width: 32, textAlign: "center", flexShrink: 0 }}>{r.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: C.TEXT2 }}>{r.strats}</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.TEXT }}>{r.outcome}</div>
                  <div style={{ fontSize: 11, color: C.DIM }}>{r.en}</div>
                </div>
              </div>
            ))}
          </div>
          <button className="btn-press" onClick={() => setScreen("play")}
            style={{ width: "100%", padding: 16, fontSize: 16, fontWeight: 700, background: `linear-gradient(135deg, ${C.HEADER}, ${C.BLUE})`, border: "none", borderRadius: 12, color: "white", cursor: "pointer", boxShadow: `0 4px 24px ${C.BLUE}50`, marginBottom: 30 }}>
            👥 开始匹配对手
          </button>
        </div>
      </div>
    );
  }

  // ---- GRADE GAME PLAY ----
  if (screen === "play") return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG} 0%, #0F1A30 100%)` }}>
      <button className="btn-press" onClick={() => { setScreen("home"); setWaiting(false); setChoice(null); }} style={{ position: "fixed", top: 14, left: 14, background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer" }}>← 返回</button>
      <div style={{ maxWidth: 400, width: "100%", textAlign: "center" }}>
        <p style={{ fontSize: 11, color: C.GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4 }}>{game.nameCN} · Week {game.week}</p>
        {!waiting ? (
          <div className="fade-up">
            <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 6 }}>选择你的策略 Make Your Choice</h2>
            <p style={{ fontSize: 12, color: C.DIM, marginBottom: 20 }}>{game.descCN}</p>
            <div style={{ marginBottom: 20 }}>
              <button className="btn-press" onClick={() => setShowMatrix(!showMatrix)}
                style={{ fontSize: 11, color: C.DIM, background: "none", border: `1px solid ${C.DIM}25`, borderRadius: 6, padding: "5px 10px", cursor: "pointer" }}>
                {showMatrix ? "▲ 隐藏" : "▼ 收益矩阵 Payoff Matrix"}
              </button>
              {showMatrix && (
                <div style={{ marginTop: 10, background: C.SURFACE, borderRadius: 10, padding: 12, border: `1px solid ${C.HEADER}25` }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    {game.matrix.map((row, i) => (
                      <tr key={i}>{row.map((cell, j) => (
                        <td key={j} style={{ padding: "8px 6px", textAlign: "center", fontWeight: i === 0 || j === 0 ? 700 : 400, color: i === 0 || j === 0 ? C.GOLD : C.TEXT, background: (i === 1 && j === 1) ? `${C.RED}12` : (i === 2 && j === 2) ? `${C.GOLD}12` : "transparent", borderRadius: 4 }}>{cell}</td>
                      ))}</tr>
                    ))}
                  </table>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
              {game.strategies.map(strat => (
                <button key={strat} className="btn-press" onClick={() => handleChoice(strat)}
                  style={{ width: 130, height: 150, fontSize: 44, fontWeight: 800, background: strat === "α" ? `linear-gradient(145deg, ${C.ALPHA_BG}, #0F2040)` : `linear-gradient(145deg, ${C.BETA_BG}, #1A1035)`, border: `2px solid ${strat === "α" ? C.HEADER : "#4A3070"}`, borderRadius: 18, color: strat === "α" ? C.ALPHA_C : C.BETA_C, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", boxShadow: `0 6px 24px ${strat === "α" ? C.BLUE : "#2D1B4E"}35` }}>
                  {strat}<div style={{ fontSize: 11, fontWeight: 400, marginTop: 6, opacity: 0.5, color: C.TEXT2 }}>{strat === "α" ? "Alpha" : "Beta"}</div>
                </button>
              ))}
            </div>
          </div>
        ) : (
          <div className="fade-up" style={{ padding: 40 }}>
            <div style={{ position: "relative", width: 80, height: 80, margin: "0 auto 16px" }}>
              <svg width="80" height="80" style={{ transform: "rotate(-90deg)" }}>
                <circle cx="40" cy="40" r="34" fill="none" stroke={`${C.DIM}25`} strokeWidth="4" />
                <circle cx="40" cy="40" r="34" fill="none" stroke={C.GOLD} strokeWidth="4" strokeDasharray={`${2*Math.PI*34}`} strokeDashoffset={`${2*Math.PI*34*(1-countdown/30)}`} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear" }} />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, fontWeight: 800, color: C.GOLD }}>{countdown}</div>
            </div>
            <h2 style={{ fontSize: 18, color: C.TEXT, marginBottom: 6 }}>等待同学们提交...</h2>
            <p style={{ fontSize: 12, color: C.DIM }}>{countdown > 0 ? `${countdown}s` : "Matching..."}</p>
            <p style={{ fontSize: 14, color: C.TEXT2, marginTop: 12 }}>你选择了 <strong style={{ color: choice === "α" ? C.ALPHA_C : C.BETA_C, fontSize: 18 }}>{choice}</strong></p>
          </div>
        )}
      </div>
    </div>
  );

  // ---- GRADE GAME RESULT ----
  if (screen === "result" && result) {
    const win = result.myPay > result.oppPay;
    const tie = result.myPay === result.oppPay;
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: win ? `linear-gradient(165deg, #0B200F, #0F1A30)` : tie ? `linear-gradient(165deg, #1A1A0B, #0F1A30)` : `linear-gradient(165deg, #200B0B, #0F1A30)` }}>
        <div style={{ maxWidth: 400, width: "100%", textAlign: "center" }}>
          <div className="fade-up" style={{ fontSize: 44, marginBottom: 4 }}>{win ? "🎉" : tie ? "🤝" : "😤"}</div>
          <h2 className="fade-up fade-up-1" style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 2 }}>{result.label}</h2>
          <p className="fade-up fade-up-1" style={{ fontSize: 12, color: C.TEXT2, marginBottom: 20 }}>vs {result.oppName}</p>
          <div className="fade-up fade-up-2" style={{ display: "flex", gap: 12, marginBottom: 20 }}>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM, marginBottom: 2 }}>你的选择</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: result.myChoice === "α" ? C.ALPHA_C : C.BETA_C }}>{result.myChoice}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: result.myPay >= 0 ? C.GREEN : C.RED, marginTop: 2 }}>{result.myPay > 0 ? "+" : ""}{result.myPay}</div>
            </Box>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM, marginBottom: 2 }}>对方选择</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: result.oppChoice === "α" ? C.ALPHA_C : C.BETA_C }}>{result.oppChoice}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: result.oppPay >= 0 ? C.GREEN : C.RED, marginTop: 2 }}>{result.oppPay > 0 ? "+" : ""}{result.oppPay}</div>
            </Box>
          </div>
          <div className="fade-up fade-up-3" style={{ background: `${C.GOLD}0C`, border: `1px solid ${C.GOLD}25`, borderRadius: 12, padding: 14, marginBottom: 14, textAlign: "left" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 4 }}>💡 {game.lessonTitle}</div>
            <div style={{ fontSize: 12, color: C.TEXT2, lineHeight: 1.65 }}>
              {game.lessons[result.key].split("\n\n").map((para, i) => (
                <p key={i} style={{ margin: i === 0 ? "0 0 8px" : "0", color: i === 0 ? C.TEXT2 : C.DIM, fontStyle: i === 0 ? "normal" : "italic" }}>{para}</p>
              ))}
            </div>

    const r = ultMyResult;

      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(165deg, ${C.BG}, #1F0F18)` }}>
        <div style={{ width: 40, height: 40, border: `3px solid ${C.DIM}30`, borderTopColor: C.RED, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      </div>
    );

    const isOfferer = r.myRole === "O";
    const roleColor = isOfferer ? C.GOLD : C.TEAL;
    const bgTint = r.accepted ? "#0B200F" : "#200B0B";

    // Build histograms from latest round stats
    const stats = ultRoundStats;
    const makeHist = (values, bins = 11) => {
      const counts = Array(bins).fill(0);
      values.forEach(v => {
        const idx = Math.min(Math.floor(v / (100 / (bins - 1))), bins - 1);
        counts[idx]++;
      });
      return counts;
    };
    const offerHist = stats?.offers ? makeHist(stats.offers) : null;
    const threshHist = stats?.thresholds ? makeHist(stats.thresholds) : null;
    const maxBin = (offerHist && threshHist)
      ? Math.max(...offerHist, ...threshHist, 1)
      : 1;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, ${bgTint})`, overflowY: "auto" }}>
        <div style={{ maxWidth: 460, margin: "0 auto", textAlign: "center" }}>
          <div className="fade-up" style={{ fontSize: 48, marginBottom: 8 }}>{r.accepted ? "🤝" : "💢"}</div>
          <h2 className="fade-up fade-up-1" style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>
            {r.accepted ? "成交！Deal!" : "拒绝! Rejected!"}
          </h2>
          <p className="fade-up fade-up-1" style={{ fontSize: 13, color: r.accepted ? C.GREEN : C.RED, marginBottom: 20 }}>
            Round {ultRound} · {isOfferer ? "你是 Offerer" : "你是 Responder"}
          </p>

          {/* Match breakdown */}
          <Box className="fade-up fade-up-2" style={{ marginBottom: 16, padding: 14, textAlign: "left", border: `1px solid ${roleColor}30` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: roleColor, marginBottom: 10 }}>🎯 你的匹配 Your Match</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 13 }}>
              <div>
                <div style={{ fontSize: 10, color: C.DIM }}>{isOfferer ? "你的提议 m" : "你的门槛 t"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: roleColor }}>{r.myValue}</div>
              </div>
              <div>
                <div style={{ fontSize: 10, color: C.DIM }}>{isOfferer ? "对方门槛 t" : "对方提议 m"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: C.TEXT2 }}>{r.oppValue}</div>
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.DIM, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20` }}>
              对手 Partner: <span style={{ color: C.TEXT }}>{r.oppName}</span>
            </div>
            <div style={{ fontSize: 11, color: C.TEXT2, marginTop: 6, fontFamily: "monospace" }}>
              {isOfferer
                ? `m=${r.myValue} ${r.accepted ? "≥" : "<"} t=${r.oppValue} → ${r.accepted ? "ACCEPTED ✓" : "REJECTED ✗"}`
                : `m=${r.oppValue} ${r.accepted ? "≥" : "<"} t=${r.myValue} → ${r.accepted ? "ACCEPTED ✓" : "REJECTED ✗"}`}
            </div>
          </Box>

          {/* Payoffs */}
          <div className="fade-up fade-up-2" style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM }}>你的收益 Your payoff</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: r.myPayoff > 0 ? C.GREEN : C.DIM }}>{r.myPayoff}</div>
            </Box>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM }}>对方收益 Their payoff</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: r.oppPayoff > 0 ? C.GREEN : C.DIM }}>{r.oppPayoff}</div>
            </Box>
          </div>

          {/* Class-wide distributions */}
          {stats && offerHist && threshHist && (
            <Box className="fade-up fade-up-3" style={{ marginBottom: 16, padding: 14, textAlign: "left" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 10 }}>📊 班级分布 Class Distribution</div>
              <div style={{ display: "flex", gap: 20, fontSize: 11, marginBottom: 10 }}>
                <span style={{ color: C.GOLD }}>● Offers (n={stats.oCount}), 均值={stats.avgOffer}</span>
                <span style={{ color: C.TEAL }}>● Thresholds (n={stats.rCount}), 均值={stats.avgThreshold}</span>
              </div>

              {/* Overlaid histogram */}
              <svg viewBox="0 0 340 140" style={{ width: "100%", maxWidth: 380 }}>
                {[0, 25, 50, 75, 100].map(tick => (
                  <g key={tick}>
                    <line x1={20 + tick * 3} y1={10} x2={20 + tick * 3} y2={110} stroke={`${C.DIM}15`} strokeWidth="0.5" />
                    <text x={20 + tick * 3} y={125} textAnchor="middle" fontSize="9" fill={C.DIM}>{tick}</text>
                  </g>
                ))}
                {offerHist.map((c, i) => {
                  const x = 20 + i * 30;
                  const h = (c / maxBin) * 90;
                  return <rect key={`o${i}`} x={x - 8} y={110 - h} width="7" height={h} fill={C.GOLD} opacity="0.75" />;
                })}
                {threshHist.map((c, i) => {
                  const x = 20 + i * 30;
                  const h = (c / maxBin) * 90;
                  return <rect key={`t${i}`} x={x + 1} y={110 - h} width="7" height={h} fill={C.TEAL} opacity="0.75" />;
                })}
                {/* Mean markers */}
                <line x1={20 + stats.avgOffer * 3} y1={8} x2={20 + stats.avgOffer * 3} y2={112} stroke={C.GOLD} strokeWidth="1.5" strokeDasharray="3,2" />
                <line x1={20 + stats.avgThreshold * 3} y1={8} x2={20 + stats.avgThreshold * 3} y2={112} stroke={C.TEAL} strokeWidth="1.5" strokeDasharray="3,2" />
                <text x={20} y={9} fontSize="8" fill={C.DIM}>bin=10</text>
              </svg>

              <div style={{ display: "flex", justifyContent: "space-around", fontSize: 11, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20` }}>
                <span style={{ color: C.TEXT2 }}>接受率 Accept: <strong style={{ color: C.GREEN }}>{stats.acceptRate}%</strong></span>
                <span style={{ color: C.TEXT2 }}>中位 Offer: <strong style={{ color: C.GOLD }}>{stats.medianOffer}</strong></span>
                <span style={{ color: C.TEXT2 }}>中位 Thresh: <strong style={{ color: C.TEAL }}>{stats.medianThreshold}</strong></span>
              </div>
            </Box>
          )}

          {/* SPNE contrast — the pedagogical punchline */}
          <Box className="fade-up fade-up-3" style={{ marginBottom: 16, padding: 14, background: `${C.RED}08`, border: `1px solid ${C.RED}25`, textAlign: "left" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 6 }}>🎓 SPNE 预测 vs 实际</div>
            <div style={{ fontSize: 12, color: C.TEXT2, lineHeight: 1.7 }}>
              标准分析: Offerer 应提议 <strong style={{ color: C.GOLD }}>m* = 0</strong>, Responder 接受所有 <strong style={{ color: C.TEAL }}>t* = 0</strong>.<br/>
              {stats && (
                <span>
                  本轮均值: m̄ = <strong style={{ color: C.GOLD }}>{stats.avgOffer}</strong>, t̄ = <strong style={{ color: C.TEAL }}>{stats.avgThreshold}</strong>.
                  {" "}偏离 SPNE 很远 — 为什么? 公平偏好、spite、情感. (Watson 19.8)
                </span>
              )}
            </div>
          </Box>

          {/* Waiting for next round */}
          <div style={{ background: `${C.RED}0C`, borderRadius: 10, padding: 12, border: `1px solid ${C.RED}20` }}>
            <div style={{ width: 30, height: 30, margin: "0 auto 8px", border: `2px solid ${C.DIM}30`, borderTopColor: C.RED, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 12, color: C.TEXT2 }}>等待下一轮... Waiting for next round...</div>
          </div>
        </div>
      </div>
    );
  }

  // ================================================================
  // TEACHER PANEL
  // ================================================================
  if (screen === "teacher") {
    const total = stats.alpha + stats.beta;
    const aR = total > 0 ? Math.round(stats.alpha / total * 100) : 0;
    const bR = total > 0 ? Math.round(stats.beta / total * 100) : 0;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>🎓 教师面板 Teacher Panel</h2>

          {/* Tab switcher */}
          <div style={{ display: "flex", gap: 4, marginBottom: 20, flexWrap: "wrap" }}>
            {[{ id: "grade", label: "📝 成绩" }, { id: "beauty", label: "🏆 选美" }, { id: "nash", label: "⚖️ 纳什" }, { id: "invest", label: "💰 投资" }, { id: "ultimatum", label: "🤝 通牒" }].map(t => (
              <button key={t.id} className="btn-press" onClick={() => { setTeacherTab(t.id); if (t.id === "grade") loadStats(); if (t.id === "nash") loadNashAllStats(); if (t.id === "invest") loadInvestAllResults(); if (t.id === "ultimatum") loadUltAllStats(); }}
                style={{ flex: "1 1 80px", padding: "10px 4px", fontSize: 12, fontWeight: 700, background: teacherTab === t.id ? `${C.GOLD}20` : "transparent", border: teacherTab === t.id ? `1px solid ${C.GOLD}50` : `1px solid ${C.DIM}25`, borderRadius: 10, color: teacherTab === t.id ? C.GOLD : C.DIM, cursor: "pointer" }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ---- GRADE TAB ---- */}
          {teacherTab === "grade" && (
            <div>
              <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}><div style={{ fontSize: 32, fontWeight: 800, color: C.ALPHA_C }}>{aR}%</div><div style={{ fontSize: 12, color: C.TEXT2 }}>α ({stats.alpha})</div></Box>
                <Box style={{ flex: 1, textAlign: "center" }}><div style={{ fontSize: 32, fontWeight: 800, color: C.BETA_C }}>{bR}%</div><div style={{ fontSize: 12, color: C.TEXT2 }}>β ({stats.beta})</div></Box>
              </div>
              <Box style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", height: 28, borderRadius: 8, overflow: "hidden", background: `${C.DIM}20` }}>
                  <div style={{ width: `${aR}%`, background: `linear-gradient(90deg, #3A7BD5, ${C.ALPHA_C})`, transition: "width 0.6s", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>{aR > 12 ? `α ${aR}%` : ""}</div>
                  <div style={{ width: `${bR}%`, background: `linear-gradient(90deg, #7B4FBF, ${C.BETA_C})`, transition: "width 0.6s", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>{bR > 12 ? `β ${bR}%` : ""}</div>
                </div>
              </Box>
              <Box style={{ background: `${C.GOLD}08`, border: `1px solid ${C.GOLD}20`, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 6 }}>📖 对比 Polak (Yale 2007)</div>
                <div style={{ fontSize: 11, color: C.TEXT2, lineHeight: 1.6 }}>
                  耶鲁: ~85% α, ~15% β<br/><strong style={{ color: C.TEXT }}>你的课堂: {aR}% α, {bR}% β ({total}人)</strong>
                </div>
              </Box>
              {stats.results.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>最近结果 Recent ({stats.results.length})</div>
                  {stats.results.slice(0, 15).map((r, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.DIM}10`, fontSize: 12 }}>
                      <span style={{ color: C.TEXT }}>{r.player}</span>
                      <span style={{ color: r.choice === "α" ? C.ALPHA_C : C.BETA_C, fontWeight: 700 }}>{r.choice}</span>
                      <span style={{ color: r.payoff >= 0 ? C.GREEN : C.RED, fontWeight: 700 }}>{r.payoff > 0 ? "+" : ""}{r.payoff}</span>
                    </div>
                  ))}
                </Box>
              )}
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button className="btn-press" onClick={loadStats} style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>🔄 刷新</button>
                <button className="btn-press" onClick={async () => { const pw = prompt("Type 'reset':"); if (pw !== "reset") return; await db.ref(`games/${gameId}`).remove(); setStats({ alpha: 0, beta: 0, results: [] }); alert("✅ Reset!"); }}
                  style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>🗑️ 清除</button>
              </div>
            </div>
          )}

          {/* ---- BEAUTY TAB ---- */}
          {teacherTab === "beauty" && (
            <div>
              <Box style={{ marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: C.DIM }}>已提交 Submissions</div>
                <div style={{ fontSize: 36, fontWeight: 800, color: C.PURPLE }}>{beautySubCount}</div>
              </Box>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn-press" onClick={revealBeautyResults}
                  style={{ flex: 1, padding: 12, fontSize: 13, fontWeight: 700, background: `linear-gradient(135deg, #4A3070, #2D1B4E)`, border: "none", borderRadius: 10, color: "white", cursor: "pointer", opacity: beautySubCount > 0 ? 1 : 0.4 }} disabled={beautySubCount === 0}>
                  🎉 揭晓结果
                </button>
                <button className="btn-press" onClick={resetBeautyContest}
                  style={{ padding: 12, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>
                  🗑️ 重置
                </button>
              </div>
            </div>
          )}

          {/* ---- NASH TAB ---- */}
          {teacherTab === "nash" && (
            <div>
              {/* Status */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>当前轮次 Round</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: C.TEAL }}>{nashRound || "—"}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>阶段 Phase</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: nashPhase === "playing" ? C.GREEN : nashPhase === "results" ? C.GOLD : C.DIM, marginTop: 6 }}>
                    {nashPhase === "playing" ? "进行中 Playing" : nashPhase === "results" ? "已结束 Results" : "等待中 Lobby"}
                  </div>
                </Box>
              </div>

              {/* Player & submission counts */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.AMBER}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>P1 (行)</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.AMBER }}>{nashPlayerCounts.p1}</div>
                  {nashPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {nashSubCounts.p1}</div>}
                </Box>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.TEAL}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>P2 (列)</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.TEAL }}>{nashPlayerCounts.p2}</div>
                  {nashPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {nashSubCounts.p2}</div>}
                </Box>
              </div>

              {/* Control buttons */}
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {(nashPhase === "lobby" || nashPhase === "results") && (
                  <button className="btn-press" onClick={() => nashStartRound((nashRound || 0) + 1)}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, ${C.TEAL_DARK}, #0A1F1E)`, border: `1px solid ${C.TEAL}50`, borderRadius: 12, color: C.TEAL, cursor: "pointer" }}>
                    ▶️ {nashRound ? `开始第 ${nashRound + 1} 轮` : "开始第 1 轮"}
                  </button>
                )}
                {nashPhase === "playing" && (
                  <button className="btn-press" onClick={nashEndRound}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A0F, #1A1008)`, border: `1px solid ${C.AMBER}50`, borderRadius: 12, color: C.AMBER, cursor: "pointer" }}>
                    ⏹️ 结束本轮 & 匹配
                  </button>
                )}
                <button className="btn-press" onClick={nashResetGame}
                  style={{ padding: 14, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                  🗑️
                </button>
              </div>

              {/* Convergence chart */}
              <Box style={{ marginBottom: 16, border: `1px solid ${C.TEAL}20` }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.TEAL, marginBottom: 10 }}>📈 收敛趋势 Convergence to NE (U, R)</div>
                <ConvergenceChart allStats={nashAllStats} />
                <div style={{ fontSize: 10, color: C.DIM, marginTop: 6, textAlign: "center" }}>
                  NE预测: P1全选U, P2全选R → 两条线都趋向100%
                </div>
              </Box>

              {/* Per-round stats table */}
              {nashAllStats.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>各轮数据 Round-by-round</div>
                  <table style={{ width: "100%", fontSize: 11, borderCollapse: "collapse" }}>
                    <thead>
                      <tr>
                        <td style={{ padding: 4, fontWeight: 700, color: C.DIM }}>R</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>U%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>M%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>D%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>L%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>R%</td>
                      </tr>
                    </thead>
                    <tbody>
                      {nashAllStats.map((s, i) => {
                        const p1t = s.p1?.total || 1;
                        const p2t = s.p2?.total || 1;
                        return (
                          <tr key={i} style={{ borderTop: `1px solid ${C.DIM}15` }}>
                            <td style={{ padding: 4, color: C.TEXT }}>{s.round}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.U || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.M || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.D || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p2?.L || 0) / p2t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p2?.R || 0) / p2t * 100)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </Box>
              )}

              <button className="btn-press" onClick={loadNashAllStats} style={{ width: "100%", padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer", marginTop: 12 }}>
                🔄 刷新数据 Refresh
              </button>
            </div>
          )}

          {/* ---- INVEST TAB ---- */}
          {teacherTab === "invest" && (
            <div>
              {/* Status */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>轮次 Round</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: C.GOLD }}>{investRound || "—"}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>已提交</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: C.TEXT }}>{investSubCount}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>阶段</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: investPhase === "open" ? C.GREEN : investPhase === "results" ? C.GOLD : C.DIM, marginTop: 6 }}>
                    {investPhase === "open" ? "进行中" : investPhase === "results" ? "已揭晓" : "等待中"}
                  </div>
                </Box>
              </div>

              {/* Threshold input + start */}
              {(investPhase === "lobby" || investPhase === "results") && (
                <Box style={{ marginBottom: 16, border: `1px solid ${C.GOLD}25` }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 10 }}>设置门槛 Set Threshold</div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                    {[20, 50, 80].map(t => (
                      <button key={t} className="btn-press" onClick={() => setInvestThreshold(t)}
                        style={{ flex: 1, padding: "10px 6px", fontSize: 14, fontWeight: 700, background: investThreshold === t ? `${C.GOLD}25` : "transparent", border: `1px solid ${investThreshold === t ? C.GOLD : C.DIM}40`, borderRadius: 8, color: investThreshold === t ? C.GOLD : C.DIM, cursor: "pointer" }}>
                        {t}%
                      </button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
                    <span style={{ fontSize: 12, color: C.TEXT2 }}>自定义:</span>
                    <input type="number" min="1" max="100" value={investThreshold}
                      onChange={e => setInvestThreshold(Math.max(1, Math.min(100, parseInt(e.target.value) || 1)))}
                      style={{ width: 70, padding: "6px 10px", fontSize: 16, fontWeight: 700, background: C.SURFACE, border: `1px solid ${C.GOLD}40`, borderRadius: 8, color: C.GOLD, textAlign: "center", outline: "none" }} />
                    <span style={{ fontSize: 12, color: C.DIM }}>%</span>
                  </div>
                  <button className="btn-press" onClick={() => investStartRound((investRound || 0) + 1, investThreshold)}
                    style={{ width: "100%", padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A2008, #1A1508)`, border: `1px solid ${C.GOLD}50`, borderRadius: 12, color: C.GOLD, cursor: "pointer" }}>
                    ▶️ {investRound ? `开始第 ${investRound + 1} 轮 (${investThreshold}%)` : `开始第 1 轮 (${investThreshold}%)`}
                  </button>
                </Box>
              )}

              {/* Reveal button */}
              {investPhase === "open" && (
                <button className="btn-press" onClick={investReveal}
                  style={{ width: "100%", padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A0F, #1A1008)`, border: `1px solid ${C.AMBER}50`, borderRadius: 12, color: C.AMBER, cursor: "pointer", marginBottom: 16 }}>
                  🎉 揭晓结果 Reveal ({investSubCount} submitted, threshold {investThreshold}%)
                </button>
              )}

              {/* All rounds results */}
              {investAllResults.length > 0 && (
                <Box style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 10 }}>📊 各轮结果 All Rounds</div>
                  {investAllResults.map((res, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: i < investAllResults.length - 1 ? `1px solid ${C.DIM}15` : "none" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: C.TEXT, width: 30 }}>R{res.round}</span>
                      <span style={{ fontSize: 12, color: C.GOLD, width: 45 }}>≥{res.threshold}%</span>
                      <div style={{ flex: 1, height: 20, borderRadius: 5, overflow: "hidden", background: `${C.DIM}15`, position: "relative" }}>
                        <div style={{ width: `${res.pct}%`, height: "100%", background: res.success ? C.GREEN : C.RED, borderRadius: 5 }} />
                        <div style={{ position: "absolute", left: `${res.threshold}%`, top: 0, bottom: 0, width: 2, background: `${C.GOLD}` }} />
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: res.success ? C.GREEN : C.RED, width: 55, textAlign: "right" }}>
                        {res.invested}/{res.total} ({res.pct}%)
                      </span>
                      <span style={{ fontSize: 14 }}>{res.success ? "✓" : "✗"}</span>
                    </div>
                  ))}
                </Box>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button className="btn-press" onClick={loadInvestAllResults} style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>🔄 刷新</button>
                <button className="btn-press" onClick={investReset} style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>🗑️ 重置</button>
              </div>
            </div>
          )}

          {/* ---- ULTIMATUM TAB ---- */}
          {teacherTab === "ultimatum" && (() => {
            const latest = ultAllStats.length > 0 ? ultAllStats[ultAllStats.length - 1] : null;
            const makeHist = (values, bins = 11) => {
              const counts = Array(bins).fill(0);
              values.forEach(v => {
                const idx = Math.min(Math.floor(v / (100 / (bins - 1))), bins - 1);
                counts[idx]++;
              });
              return counts;
            };
            const oHist = latest?.offers ? makeHist(latest.offers) : null;
            const tHist = latest?.thresholds ? makeHist(latest.thresholds) : null;
            const maxBin = (oHist && tHist) ? Math.max(...oHist, ...tHist, 1) : 1;
            return (
            <div>
              {/* Status */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>轮次 Round</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: C.RED }}>{ultRound || "—"}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>阶段 Phase</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: ultPhase === "playing" ? C.GREEN : ultPhase === "results" ? C.GOLD : C.DIM, marginTop: 6 }}>
                    {ultPhase === "playing" ? "进行中" : ultPhase === "results" ? "已揭晓" : "等待中"}
                  </div>
                </Box>
              </div>

              {/* Role counts */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.GOLD}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>💰 Offerers</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.GOLD }}>{ultPlayerCounts.o}</div>
                  {ultPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {ultSubCounts.o}</div>}
                </Box>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.TEAL}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>⚖️ Responders</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.TEAL }}>{ultPlayerCounts.r}</div>
                  {ultPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {ultSubCounts.r}</div>}
                </Box>
              </div>

              {/* Controls */}
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {(ultPhase === "lobby" || ultPhase === "results") && (
                  <button className="btn-press" onClick={() => ultStartRound((ultRound || 0) + 1)}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #3A1820, #1F0F18)`, border: `1px solid ${C.RED}50`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                    ▶️ {ultRound ? `开始第 ${ultRound + 1} 轮` : "开始第 1 轮"}
                  </button>
                )}
                {ultPhase === "playing" && (
                  <button className="btn-press" onClick={ultEndRound}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A0F, #1A1008)`, border: `1px solid ${C.AMBER}50`, borderRadius: 12, color: C.AMBER, cursor: "pointer" }}>
                    ⏹️ 结束 & 匹配
                  </button>
                )}
                <button className="btn-press" onClick={ultResetGame}
                  style={{ padding: 14, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                  🗑️
                </button>
              </div>

              {/* Latest round histogram */}
              {latest && oHist && tHist && (
                <Box style={{ marginBottom: 16, border: `1px solid ${C.RED}20` }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 8 }}>
                    📊 第 {latest.round} 轮分布 Round {latest.round} Distribution
                  </div>
                  <div style={{ display: "flex", gap: 14, fontSize: 10, marginBottom: 6 }}>
                    <span style={{ color: C.GOLD }}>■ Offers (μ={latest.avgOffer}, median={latest.medianOffer})</span>
                    <span style={{ color: C.TEAL }}>■ Thresholds (μ={latest.avgThreshold}, median={latest.medianThreshold})</span>
                  </div>
                  <svg viewBox="0 0 340 160" style={{ width: "100%" }}>
                    {[0, 25, 50, 75, 100].map(tick => (
                      <g key={tick}>
                        <line x1={20 + tick * 3} y1={10} x2={20 + tick * 3} y2={130} stroke={`${C.DIM}15`} strokeWidth="0.5" />
                        <text x={20 + tick * 3} y={145} textAnchor="middle" fontSize="9" fill={C.DIM}>{tick}</text>
                      </g>
                    ))}
                    {oHist.map((c, i) => {
                      const x = 20 + i * 30;
                      const h = (c / maxBin) * 110;
                      return <g key={`o${i}`}>
                        <rect x={x - 8} y={130 - h} width="7" height={h} fill={C.GOLD} opacity="0.75" />
                        {c > 0 && <text x={x - 4.5} y={128 - h} textAnchor="middle" fontSize="7" fill={C.GOLD}>{c}</text>}
                      </g>;
                    })}
                    {tHist.map((c, i) => {
                      const x = 20 + i * 30;
                      const h = (c / maxBin) * 110;
                      return <g key={`t${i}`}>
                        <rect x={x + 1} y={130 - h} width="7" height={h} fill={C.TEAL} opacity="0.75" />
                        {c > 0 && <text x={x + 4.5} y={128 - h} textAnchor="middle" fontSize="7" fill={C.TEAL}>{c}</text>}
                      </g>;
                    })}
                    {/* Mean lines */}
                    <line x1={20 + latest.avgOffer * 3} y1={8} x2={20 + latest.avgOffer * 3} y2={132} stroke={C.GOLD} strokeWidth="1.5" strokeDasharray="3,2" />
                    <line x1={20 + latest.avgThreshold * 3} y1={8} x2={20 + latest.avgThreshold * 3} y2={132} stroke={C.TEAL} strokeWidth="1.5" strokeDasharray="3,2" />
                    {/* SPNE marker at 0 */}
                    <line x1={20} y1={8} x2={20} y2={132} stroke={C.RED} strokeWidth="1.2" strokeDasharray="2,2" />
                    <text x={24} y={14} fontSize="8" fill={C.RED}>SPNE = 0</text>
                  </svg>
                  <div style={{ fontSize: 11, color: C.TEXT2, textAlign: "center", marginTop: 4, paddingTop: 6, borderTop: `1px solid ${C.DIM}20` }}>
                    接受率 Accept rate: <strong style={{ color: latest.acceptRate >= 50 ? C.GREEN : C.RED }}>{latest.acceptRate}%</strong>
                    {" · "}
                    匹配数 Matches: <strong style={{ color: C.TEXT }}>{latest.matches}</strong>
                  </div>
                </Box>
              )}

              {/* Multi-round summary */}
              {ultAllStats.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>各轮对比 Round-by-round</div>
                  <table style={{ width: "100%", fontSize: 11, borderCollapse: "collapse" }}>
                    <thead>
                      <tr>
                        <td style={{ padding: 4, fontWeight: 700, color: C.DIM }}>R</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.GOLD }}>μ Offer</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.GOLD }}>Med</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>μ Thresh</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>Med</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.GREEN }}>Accept%</td>
                      </tr>
                    </thead>
                    <tbody>
                      {ultAllStats.map((s, i) => (
                        <tr key={i} style={{ borderTop: `1px solid ${C.DIM}15` }}>
                          <td style={{ padding: 4, color: C.TEXT }}>{s.round}</td>
                          <td style={{ padding: 4, color: C.TEXT2 }}>{s.avgOffer}</td>
                          <td style={{ padding: 4, color: C.DIM }}>{s.medianOffer}</td>
                          <td style={{ padding: 4, color: C.TEXT2 }}>{s.avgThreshold}</td>
                          <td style={{ padding: 4, color: C.DIM }}>{s.medianThreshold}</td>
                          <td style={{ padding: 4, color: s.acceptRate >= 50 ? C.GREEN : C.RED, fontWeight: 700 }}>{s.acceptRate}%</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </Box>
              )}

              <button className="btn-press" onClick={loadUltAllStats} style={{ width: "100%", padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer", marginTop: 12 }}>
                🔄 刷新数据 Refresh
              </button>
            </div>
            );
          })()}
        </div>
      </div>
    );
  }

  // ---- HISTORY ----
  if (screen === "history") return (
    <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>📊 历史记录 History</h2>
        {stats.results.length === 0 ? (
          <p style={{ color: C.DIM, fontSize: 13 }}>还没有记录。</p>
        ) : stats.results.map((r, i) => (
          <Box key={i} style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.TEXT }}>{r.player}</div>
              <div style={{ fontSize: 10, color: C.DIM }}>{r.choice} vs {r.opponent}({r.oppChoice})</div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: r.payoff >= 0 ? C.GREEN : C.RED }}>{r.payoff > 0 ? "+" : ""}{r.payoff}</div>
          </Box>
        ))}
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById("app"));
</script>
</body>
</html>
