// AI — Claude via Anthropic API
async function getClaudeChoice(game, history) {
  try {
    const historyStr = history.length > 0
      ? "Previous rounds: " + history.map((h, i) => `Round ${i+1}: human=${h.mine}, AI=${h.opp}`).join("; ")
      : "This is the first round.";
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are playing a game theory game called "${game.name}" against a human student.
Available strategies: ${game.strategies.join(", ")}
OUTCOME matrix (grades, NOT payoffs):
  α,α → B−, B−
  α,β → A, C  
  β,α → C, A
  β,β → B+, B+
IMPORTANT: These are OUTCOMES (grades), not payoffs. The payoffs depend on PREFERENCES. 
${historyStr}
You must decide what kind of player you are and choose accordingly.
Respond in EXACTLY this JSON format, nothing else:
{"choice":"α or β","reasoning_cn":"2-4句中文。","reasoning_en":"2-4 sentences in English."}`
        }]
      })
    });
    const data = await response.json();
    const text = (data.content?.[0]?.text || "").trim();
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (game.strategies.includes(parsed.choice)) {
        return { choice: parsed.choice, reasoningCN: parsed.reasoning_cn, reasoningEN: parsed.reasoning_en };
      }
    } catch {}
    for (const s of game.strategies) {
      if (text.includes(s)) return { choice: s, reasoningCN: "AI选择了策略 " + s, reasoningEN: "AI chose strategy " + s };
    }
    return { choice: game.strategies[0], reasoningCN: "（分析不可用）", reasoningEN: "(Analysis unavailable)" };
  } catch (e) {
    console.error("Claude API error:", e);
    const fallback = game.strategies[Math.floor(Math.random() * game.strategies.length)];
    return { choice: fallback, reasoningCN: "（API连接失败，随机选择）", reasoningEN: "(API connection failed, random choice)" };
  }
}

function generateId() {

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const lemStartRound = async (roundNum) => {
    if (!firebaseReady) return;
    const playersSnap = await db.ref("games/lemons/players").once("value");
    const players = playersSnap.val() || {};
    const sellerEntries = Object.entries(players).filter(([_, v]) => v.role === "S");
    const buyerEntries = Object.entries(players).filter(([_, v]) => v.role === "B");
    if (sellerEntries.length === 0) {
      alert("没有 Seller / No sellers have joined yet!");
      return;
    }
    if (buyerEntries.length === 0) {
      alert("没有 Buyer / No buyers have joined yet!");
      return;
    }
    const peachProb = lemNextPeachProb / 100;
    const assignments = {};
    for (const [sId] of sellerEntries) {
      const carType = Math.random() < peachProb ? "peach" : "lemon";
      assignments[sId] = { carType };
    }

    // In full-info mode, also pre-match each buyer to a random seller and reveal the type
    let buyerMatches = null;
    if (lemNextInfo === "full") {
      buyerMatches = {};
      const shuffledSellers = shuffle(sellerEntries.map(([sId]) => sId));
      buyerEntries.forEach(([bId], i) => {
        const sId = shuffledSellers[i % shuffledSellers.length];
        buyerMatches[bId] = { sellerId: sId, carType: assignments[sId].carType };
      });
    }

    const config = { info: lemNextInfo, peachProb };
    const updates = {};
    updates[`games/lemons/rounds/${roundNum}/assignments`] = assignments;
    if (buyerMatches) updates[`games/lemons/rounds/${roundNum}/buyerMatches`] = buyerMatches;
    updates[`games/lemons/state`] = { round: roundNum, phase: "playing", config };
    await db.ref().update(updates);
  };

  const lemEndRound = async () => {
    if (!firebaseReady || !lemRound) return;
    const [subSnap, assignSnap, cfgSnap, bmSnap] = await Promise.all([
      db.ref(`games/lemons/rounds/${lemRound}/submissions`).once("value"),
      db.ref(`games/lemons/rounds/${lemRound}/assignments`).once("value"),
      db.ref("games/lemons/state/config").once("value"),
      db.ref(`games/lemons/rounds/${lemRound}/buyerMatches`).once("value"),
    ]);
    const subs = subSnap.val();
    const assignments = assignSnap.val() || {};
    const config = cfgSnap.val() || { info: "asym", peachProb: 0.5 };
    const buyerMatches = bmSnap.val() || null; // present in full-info rounds
    if (!subs) { alert("没有提交 / No submissions!"); return; }

    const entries = Object.entries(subs);
    const sellerSubs = entries.filter(([_, v]) => v.role === "S");
    const buyerSubs = entries.filter(([_, v]) => v.role === "B");
    const sellerMap = Object.fromEntries(sellerSubs);
    const buyerMap = Object.fromEntries(buyerSubs);

    if (sellerSubs.length === 0 || buyerSubs.length === 0) {
      alert("需要至少一个 Seller 和一个 Buyer / Need at least one of each role!");
      return;
    }

    const playerResults = {};
    const matches = [];

    // Helper: compute trade outcome for a (seller, buyer) pair
    const computePair = (sId, sData, bId, bData) => {
      const carType = assignments[sId]?.carType || sData.carType || "lemon";
      const ask = sData.value;
      const bid = bData.value;
      const traded = bid >= ask;
      const price = traded ? Math.round((bid + ask) / 2) : null;
      const sVal = LEM_VALS[carType].seller;
      const bVal = LEM_VALS[carType].buyer;
      const sPay = traded ? (price - sVal) : 0;
      const bPay = traded ? (bVal - price) : 0;
      return { sId, bId, carType, ask, bid, traded, price, sPay, bPay, sVal, bVal, sName: sData.name, bName: bData.name };
    };

    if (config.info === "full" && buyerMatches) {
      // FULL INFO: honor pre-assigned buyer→seller matches.
      // Each buyer's outcome is canonical (their pre-matched seller).
      // Each seller's outcome: if assigned by ≥1 submitting buyer, pick one of them; else pair randomly among submitting buyers (rare — only if their pre-matched buyer didn't show up at all, but we don't pre-match the seller side).
      // Simplest faithful rule: buyer's match = pre-assigned. Seller's match = any submitting buyer that was pre-matched to them; if none, a random submitting buyer.
      const sellerToBuyers = {}; // sId -> array of bIds that pre-matched to it AND submitted
      for (const [bId, m] of Object.entries(buyerMatches)) {
        if (buyerMap[bId]) {
          (sellerToBuyers[m.sellerId] ||= []).push(bId);
        }
      }

      // Buyer-side results
      for (const [bId, bData] of buyerSubs) {
        const m = buyerMatches[bId];
        if (!m || !sellerMap[m.sellerId]) {
          // Buyer's pre-matched seller didn't submit — pair with a random submitting seller
          const [sId, sData] = sellerSubs[Math.floor(Math.random() * sellerSubs.length)];
          const out = computePair(sId, sData, bId, bData);
          matches.push(out);
          playerResults[bId] = {
            myRole: "B", myValue: out.bid, oppValue: out.ask, oppName: out.sName,
            traded: out.traded, price: out.price, carType: out.carType,
            myValuation: out.bVal, oppValuation: out.sVal,
            myPayoff: out.bPay, oppPayoff: out.sPay, info: config.info,
          };
        } else {
          const sId = m.sellerId;
          const sData = sellerMap[sId];
          const out = computePair(sId, sData, bId, bData);
          matches.push(out);
          playerResults[bId] = {
            myRole: "B", myValue: out.bid, oppValue: out.ask, oppName: out.sName,
            traded: out.traded, price: out.price, carType: out.carType,
            myValuation: out.bVal, oppValuation: out.sVal,
            myPayoff: out.bPay, oppPayoff: out.sPay, info: config.info,
          };
        }
      }
      // Seller-side results
      for (const [sId, sData] of sellerSubs) {
        const candidates = sellerToBuyers[sId] || [];
        let bId, bData;
        if (candidates.length > 0) {
          bId = candidates[Math.floor(Math.random() * candidates.length)];
          bData = buyerMap[bId];
        } else {
          [bId, bData] = buyerSubs[Math.floor(Math.random() * buyerSubs.length)];
        }
        const out = computePair(sId, sData, bId, bData);
        // Only add to matches if this seller wasn't already represented from the buyer side
        if (!matches.find(mm => mm.sId === sId && mm.bId === bId)) {
          matches.push(out);
        }
        playerResults[sId] = {
          myRole: "S", myValue: out.ask, oppValue: out.bid, oppName: out.bName,
          traded: out.traded, price: out.price, carType: out.carType,
          myValuation: out.sVal, oppValuation: out.bVal,
          myPayoff: out.sPay, oppPayoff: out.bPay, info: config.info,
        };
      }
    } else {
      // ASYM INFO: random matching. Pair every seller with a random buyer; pair unmatched buyers with a random seller.
      const shuffledBuyers = shuffle(buyerSubs);
      for (const [sId, sData] of sellerSubs) {
        const [bId, bData] = shuffledBuyers[Math.floor(Math.random() * shuffledBuyers.length)];
        const out = computePair(sId, sData, bId, bData);
        matches.push(out);
        playerResults[sId] = {
          myRole: "S", myValue: out.ask, oppValue: out.bid, oppName: out.bName,
          traded: out.traded, price: out.price, carType: out.carType,
          myValuation: out.sVal, oppValuation: out.bVal,
          myPayoff: out.sPay, oppPayoff: out.bPay, info: config.info,
        };
      }
      const matchedBuyerIds = new Set(matches.map(m => m.bId));
      for (const [bId, bData] of buyerSubs) {
        if (matchedBuyerIds.has(bId)) {
          const m = matches.find(mm => mm.bId === bId);
          playerResults[bId] = {
            myRole: "B", myValue: m.bid, oppValue: m.ask, oppName: m.sName,
            traded: m.traded, price: m.price, carType: m.carType,
            myValuation: m.bVal, oppValuation: m.sVal,
            myPayoff: m.bPay, oppPayoff: m.sPay, info: config.info,
          };
        } else {
          const [sId, sData] = sellerSubs[Math.floor(Math.random() * sellerSubs.length)];
          const out = computePair(sId, sData, bId, bData);
          playerResults[bId] = {
            myRole: "B", myValue: out.bid, oppValue: out.ask, oppName: out.sName,
            traded: out.traded, price: out.price, carType: out.carType,
            myValuation: out.bVal, oppValuation: out.sVal,
            myPayoff: out.bPay, oppPayoff: out.sPay, info: config.info,
          };
        }
      }
    }

    // Stats: split asks by car type
    const peachAsks = sellerSubs.filter(([sId]) => (assignments[sId]?.carType) === "peach").map(([_, v]) => v.value);
    const lemonAsks = sellerSubs.filter(([sId]) => (assignments[sId]?.carType) === "lemon").map(([_, v]) => v.value);
    const bids = buyerSubs.map(([_, v]) => v.value);

    const peachMatches = matches.filter(m => m.carType === "peach");
    const lemonMatches = matches.filter(m => m.carType === "lemon");
    const peachTraded = peachMatches.filter(m => m.traded).length;
    const lemonTraded = lemonMatches.filter(m => m.traded).length;
    const tradedAll = matches.filter(m => m.traded);
    const avgPrice = tradedAll.length > 0
      ? Math.round(tradedAll.reduce((a, m) => a + m.price, 0) / tradedAll.length)
      : null;

    const mean = arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : null;
    const median = arr => {
      if (!arr.length) return null;
      const s = [...arr].sort((a, b) => a - b);
      return s[Math.floor(s.length / 2)];
    };

    const statsData = {
      info: config.info,
      peachProb: config.peachProb,
      peachAsks, lemonAsks, bids,
      avgPeachAsk: mean(peachAsks),
      avgLemonAsk: mean(lemonAsks),
      avgBid: mean(bids),
      medianBid: median(bids),
      sCount: sellerSubs.length,
      bCount: buyerSubs.length,
      peachCount: peachMatches.length,
      lemonCount: lemonMatches.length,
      peachTraded, lemonTraded,
      peachTradeRate: peachMatches.length ? Math.round(peachTraded / peachMatches.length * 100) : 0,
      lemonTradeRate: lemonMatches.length ? Math.round(lemonTraded / lemonMatches.length * 100) : 0,
      avgPrice,
      matches: matches.length,
    };

    const updates = {};
    updates[`games/lemons/rounds/${lemRound}/playerResults`] = playerResults;
    updates[`games/lemons/rounds/${lemRound}/stats`] = statsData;
    updates["games/lemons/state/phase"] = "results";
    await db.ref().update(updates);

    await loadLemAllStats();
    alert(`✅ Round ${lemRound} (${config.info === "full" ? "对称信息" : "非对称信息"}): ${sellerSubs.length}S × ${buyerSubs.length}B, peach trade=${statsData.peachTradeRate}%, lemon trade=${statsData.lemonTradeRate}%`);
  };

  const lemResetGame = async () => {

  // ================================================================
  // AUCTION (Common-Value, First-Price Sealed-Bid) — Firebase listeners
  // ================================================================
  const auctListenersRef = useRef([]);

  useEffect(() => {

  // ================================================================
  // AUCTION — Teacher functions
  // ================================================================
  const auctStartRound = async (roundNum) => {
    if (!firebaseReady) return;
    const playersSnap = await db.ref("games/auction/players").once("value");
    const players = playersSnap.val() || {};
    const playerIds = Object.keys(players);
    if (playerIds.length === 0) {
      alert("没有玩家 / No players have joined yet!");
      return;
    }

    // Draw the bag: 10 cards i.i.d. with replacement from {1..10}
    const bag = [];
    for (let i = 0; i < 10; i++) bag.push(1 + Math.floor(Math.random() * 10));
    const V = bag.reduce((a, b) => a + b, 0);

    // Each player: 2 distinct cards sampled uniformly from the 10-card bag (without replacement per player; with replacement across players)
    const signals = {};
    for (const pid of playerIds) {
      const i1 = Math.floor(Math.random() * 10);
      let i2 = Math.floor(Math.random() * 9);
      if (i2 >= i1) i2 += 1; // pick a different index
      signals[pid] = { cards: [bag[i1], bag[i2]], indices: [i1, i2] };
    }

    const updates = {};
    updates[`games/auction/rounds/${roundNum}/bag`] = bag;
    updates[`games/auction/rounds/${roundNum}/V`] = V;
    updates[`games/auction/rounds/${roundNum}/signals`] = signals;
    updates[`games/auction/state`] = { round: roundNum, phase: "playing" };
    await db.ref().update(updates);
  };

  const auctEndRound = async () => {
    if (!firebaseReady || !auctRound) return;
    const [subSnap, vSnap, bagSnap] = await Promise.all([
      db.ref(`games/auction/rounds/${auctRound}/submissions`).once("value"),
      db.ref(`games/auction/rounds/${auctRound}/V`).once("value"),
      db.ref(`games/auction/rounds/${auctRound}/bag`).once("value"),
    ]);
    const subs = subSnap.val();
    const V = vSnap.val();
    const bag = bagSnap.val() || [];
    if (!subs) { alert("没有提交 / No submissions!"); return; }

    const entries = Object.entries(subs);
    // Find highest bid; ties broken uniformly at random
    const maxBid = Math.max(...entries.map(([_, v]) => v.bid));
    const topEntries = entries.filter(([_, v]) => v.bid === maxBid);
    const [winnerId, winnerData] = topEntries[Math.floor(Math.random() * topEntries.length)];

    const playerResults = {};
    for (const [pid, sub] of entries) {
      const isWinner = pid === winnerId;
      const payoff = isWinner ? (V - sub.bid) : 0;
      playerResults[pid] = {
        myBid: sub.bid,
        mySignal: sub.signal || null,
        mySignalSum: sub.signal ? sub.signal[0] + sub.signal[1] : null,
        myNaiveEst: sub.signal ? 5 * (sub.signal[0] + sub.signal[1]) : null,
        isWinner, payoff, V, bag,
        winnerName: winnerData.name, winnerBid: winnerData.bid,
        winnerSignal: winnerData.signal || null,
        nBidders: entries.length,
      };
    }

    // Aggregate stats
    const bids = entries.map(([_, v]) => v.bid);
    const signalSums = entries.map(([_, v]) => v.signal ? v.signal[0] + v.signal[1] : null).filter(x => x != null);
    const naiveEsts = signalSums.map(s => 5 * s);
    const mean = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
    const median = arr => {
      if (!arr.length) return null;
      const s = [...arr].sort((a, b) => a - b);
      return s[Math.floor(s.length / 2)];
    };
    const winnerPayoff = V - maxBid;

    const statsData = {
      V, bag, bids,
      nBidders: entries.length,
      avgBid: mean(bids) != null ? Math.round(mean(bids) * 10) / 10 : null,
      medianBid: median(bids),
      maxBid, minBid: Math.min(...bids),
      winnerName: winnerData.name,
      winnerBid: maxBid,
      winnerSignal: winnerData.signal || null,
      winnerPayoff,
      avgNaiveEst: mean(naiveEsts) != null ? Math.round(mean(naiveEsts) * 10) / 10 : null,
      // For the winner's curse panel: did the winner overpay vs V?
      overpaid: maxBid > V,
    };

    const updates = {};
    updates[`games/auction/rounds/${auctRound}/playerResults`] = playerResults;
    updates[`games/auction/rounds/${auctRound}/stats`] = statsData;
    updates["games/auction/state/phase"] = "results";
    await db.ref().update(updates);

    await loadAuctAllStats();
    const cursePhrase = winnerPayoff < 0 ? "🩸 winner's curse" : winnerPayoff > 0 ? "🟢 profit" : "😐 break-even";
    alert(`✅ Round ${auctRound}: V=${V}, winner=${winnerData.name} bid ${maxBid}, payoff ${winnerPayoff > 0 ? "+" : ""}${winnerPayoff} (${cursePhrase})`);
  };

    const myRef = db.ref(`games/${gameId}/pending/${myId.current}`);
    await myRef.set({
      name: name || "匿名", studentId: studentId || "",
      choice: myChoice, timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    let timeLeft = 30;
    setCountdown(timeLeft);
    const timer = setInterval(() => { timeLeft--; setCountdown(timeLeft); if (timeLeft <= 0) clearInterval(timer); }, 1000);

    setTimeout(() => {
      const matchRef = db.ref(`games/${gameId}/matches/${myId.current}`);
      const onMatch = matchRef.on("value", (snap) => {
        const match = snap.val();
        if (!match) return;
        matchRef.off("value", onMatch);
        const key = `${myChoice},${match.opponentChoice}`;
        const po = game.payoffs[key];
        setResult({ myChoice, oppChoice: match.opponentChoice, oppName: match.opponentName, label: po.label, myPay: po.p1, oppPay: po.p2, key });
        setWaiting(false); setCountdown(0); setScreen("result");
        db.ref(`games/${gameId}/results`).push({
          player: name || "匿名", studentId: studentId || "",
          choice: myChoice, opponent: match.opponentName, oppChoice: match.opponentChoice,
          payoff: po.p1, timestamp: firebase.database.ServerValue.TIMESTAMP,
        });
      });
      listenersRef.current.push(() => matchRef.off("value", onMatch));
    }, 30000);

    setTimeout(async () => {
      const myMatchSnap = await db.ref(`games/${gameId}/matches/${myId.current}`).once("value");
      if (myMatchSnap.val()) return;
      const snap = await db.ref(`games/${gameId}/pending`).once("value");
      const pending = snap.val();
      if (!pending) { setWaiting(false); setCountdown(0); alert("没有其他人提交。"); setScreen("play"); setChoice(null); return; }
      const others = Object.entries(pending).filter(([id]) => id !== myId.current);
      if (others.length === 0) { myRef.remove(); setWaiting(false); setCountdown(0); alert("没有找到对手。"); setScreen("play"); setChoice(null); return; }
      const [oppId, oppData] = others[Math.floor(Math.random() * others.length)];
      const updates = {};
      updates[`games/${gameId}/pending/${myId.current}`] = null;
      updates[`games/${gameId}/matches/${myId.current}`] = { opponentChoice: oppData.choice, opponentName: oppData.name };
      const oppMatchSnap = await db.ref(`games/${gameId}/matches/${oppId}`).once("value");
      if (!oppMatchSnap.val()) {
        updates[`games/${gameId}/pending/${oppId}`] = null;
        updates[`games/${gameId}/matches/${oppId}`] = { opponentChoice: myChoice, opponentName: name || "匿名" };
      }
      try { await db.ref().update(updates); } catch (e) { console.log("Match conflict"); }
    }, 30000);
  };

    const numbers = entries.map(e => e.number);
    const avg = numbers.reduce((a, b) => a + b, 0) / numbers.length;
    const target = (2 / 3) * avg;
    let closest = entries[0], minDist = Math.abs(entries[0].number - target);
    entries.forEach(e => { const dist = Math.abs(e.number - target); if (dist < minDist) { minDist = dist; closest = e; } });
    await db.ref("games/beauty_contest/results").set({

    const W = 320, H = 160, PAD = 36, PADR = 16;
    const maxR = Math.max(...allStats.map(s => s.round), 1);
    const xScale = (r) => PAD + (r - 1) / Math.max(maxR - 1, 1) * (W - PAD - PADR);
    const yScale = (pct) => H - PAD - (pct / 100) * (H - PAD - 12);

    const uLine = allStats.map(s => {
      const total = (s.p1?.total || s.p1?.U + s.p1?.M + s.p1?.D) || 1;
      const pct = ((s.p1?.U || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };
    });
    const rLine = allStats.map(s => {
      const total = (s.p2?.total || s.p2?.L + s.p2?.R) || 1;
      const pct = ((s.p2?.R || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };

        {/* Dots */}

              <div style={{ display: "flex", justifyContent: "space-around", alignItems: "center" }}>
                <div><div style={{ fontSize: 10, color: C.DIM }}>你 You</div><div style={{ fontSize: 22, fontWeight: 800, color: C.GOLD }}>{previewYou}</div></div>
                <div style={{ fontSize: 20, color: C.DIM }}>|</div>
                <div><div style={{ fontSize: 10, color: C.DIM }}>对方 Them</div><div style={{ fontSize: 22, fontWeight: 800, color: C.TEXT2 }}>{previewThem}</div></div>

              <div style={{ fontSize: 11, color: C.DIM, marginBottom: 4 }}>你的策略 Your strategy:</div>
              <div style={{ fontSize: 13, color: C.TEXT, lineHeight: 1.6 }}>

  function renderUltWait() {

  // ---- ULT RESULT ----
  function renderUltResult() {
    const r = ultMyResult;
    if (!r) return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(165deg, ${C.BG}, #1F0F18)` }}>

    );

    const isOfferer = r.myRole === "O";
    const roleColor = isOfferer ? C.GOLD : C.TEAL;
    const bgTint = r.accepted ? "#0B200F" : "#200B0B";

    // Build histograms from latest round stats
    const stats = ultRoundStats;
    const makeHist = (values, bins = 11) => {
      const counts = Array(bins).fill(0);
      values.forEach(v => {
        const idx = Math.min(Math.floor(v / (100 / (bins - 1))), bins - 1);
        counts[idx]++;
      });
      return counts;
    };
    const offerHist = stats?.offers ? makeHist(stats.offers) : null;
    const threshHist = stats?.thresholds ? makeHist(stats.thresholds) : null;
    const maxBin = (offerHist && threshHist)
      ? Math.max(...offerHist, ...threshHist, 1)
      : 1;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, ${bgTint})`, overflowY: "auto" }}>
        <div style={{ maxWidth: 460, margin: "0 auto", textAlign: "center" }}>
          <div className="fade-up" style={{ fontSize: 48, marginBottom: 8 }}>{r.accepted ? "🤝" : "💢"}</div>
          <h2 className="fade-up fade-up-1" style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>
            {r.accepted ? "成交！Deal!" : "拒绝! Rejected!"}
          </h2>
          <p className="fade-up fade-up-1" style={{ fontSize: 13, color: r.accepted ? C.GREEN : C.RED, marginBottom: 20 }}>
            Round {ultRound} · {isOfferer ? "你是 Offerer" : "你是 Responder"}

          {/* Match breakdown */}
          <Box className="fade-up fade-up-2" style={{ marginBottom: 16, padding: 14, textAlign: "left", border: `1px solid ${roleColor}30` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: roleColor, marginBottom: 10 }}>🎯 你的匹配 Your Match</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 13 }}>
              <div>
                <div style={{ fontSize: 10, color: C.DIM }}>{isOfferer ? "你的提议 m" : "你的门槛 t"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: roleColor }}>{r.myValue}</div>
              </div>
              <div>
                <div style={{ fontSize: 10, color: C.DIM }}>{isOfferer ? "对方门槛 t" : "对方提议 m"}</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: C.TEXT2 }}>{r.oppValue}</div>
              </div>
            </div>
            <div style={{ fontSize: 11, color: C.DIM, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20` }}>
              对手 Partner: <span style={{ color: C.TEXT }}>{r.oppName}</span>
            </div>
            <div style={{ fontSize: 11, color: C.TEXT2, marginTop: 6, fontFamily: "monospace" }}>
              {isOfferer
                ? `m=${r.myValue} ${r.accepted ? "≥" : "<"} t=${r.oppValue} → ${r.accepted ? "ACCEPTED ✓" : "REJECTED ✗"}`
                : `m=${r.oppValue} ${r.accepted ? "≥" : "<"} t=${r.myValue} → ${r.accepted ? "ACCEPTED ✓" : "REJECTED ✗"}`}
            </div>
          </Box>

          {/* Payoffs */}
          <div className="fade-up fade-up-2" style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM }}>你的收益 Your payoff</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: r.myPayoff > 0 ? C.GREEN : C.DIM }}>{r.myPayoff}</div>
            </Box>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: C.DIM }}>对方收益 Their payoff</div>
              <div style={{ fontSize: 32, fontWeight: 800, color: r.oppPayoff > 0 ? C.GREEN : C.DIM }}>{r.oppPayoff}</div>
            </Box>
          </div>

          {/* Class-wide distributions */}
          {stats && offerHist && threshHist && (
            <Box className="fade-up fade-up-3" style={{ marginBottom: 16, padding: 14, textAlign: "left" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 10 }}>📊 班级分布 Class Distribution</div>
              <div style={{ display: "flex", gap: 20, fontSize: 11, marginBottom: 10 }}>
                <span style={{ color: C.GOLD }}>● Offers (n={stats.oCount}), 均值={stats.avgOffer}</span>
                <span style={{ color: C.TEAL }}>● Thresholds (n={stats.rCount}), 均值={stats.avgThreshold}</span>
              </div>

              {/* Overlaid histogram */}
              <svg viewBox="0 0 340 140" style={{ width: "100%", maxWidth: 380 }}>
                {[0, 25, 50, 75, 100].map(tick => (
                  <g key={tick}>
                    <line x1={20 + tick * 3} y1={10} x2={20 + tick * 3} y2={110} stroke={`${C.DIM}15`} strokeWidth="0.5" />
                    <text x={20 + tick * 3} y={125} textAnchor="middle" fontSize="9" fill={C.DIM}>{tick}</text>
                  </g>
                ))}
                {offerHist.map((c, i) => {
                  const x = 20 + i * 30;
                  const h = (c / maxBin) * 90;
                  return <rect key={`o${i}`} x={x - 8} y={110 - h} width="7" height={h} fill={C.GOLD} opacity="0.75" />;
                })}
                {threshHist.map((c, i) => {
                  const x = 20 + i * 30;
                  const h = (c / maxBin) * 90;
                  return <rect key={`t${i}`} x={x + 1} y={110 - h} width="7" height={h} fill={C.TEAL} opacity="0.75" />;
                })}
                {/* Mean markers */}
                <line x1={20 + stats.avgOffer * 3} y1={8} x2={20 + stats.avgOffer * 3} y2={112} stroke={C.GOLD} strokeWidth="1.5" strokeDasharray="3,2" />
                <line x1={20 + stats.avgThreshold * 3} y1={8} x2={20 + stats.avgThreshold * 3} y2={112} stroke={C.TEAL} strokeWidth="1.5" strokeDasharray="3,2" />
                <text x={20} y={9} fontSize="8" fill={C.DIM}>bin=10</text>
              </svg>

              <div style={{ display: "flex", justifyContent: "space-around", fontSize: 11, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20` }}>
                <span style={{ color: C.TEXT2 }}>接受率 Accept: <strong style={{ color: C.GREEN }}>{stats.acceptRate}%</strong></span>
                <span style={{ color: C.TEXT2 }}>中位 Offer: <strong style={{ color: C.GOLD }}>{stats.medianOffer}</strong></span>
                <span style={{ color: C.TEXT2 }}>中位 Thresh: <strong style={{ color: C.TEAL }}>{stats.medianThreshold}</strong></span>
              </div>
            </Box>
          )}

          {/* SPNE contrast — the pedagogical punchline */}
          <Box className="fade-up fade-up-3" style={{ marginBottom: 16, padding: 14, background: `${C.RED}08`, border: `1px solid ${C.RED}25`, textAlign: "left" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 6 }}>🎓 SPNE 预测 vs 实际</div>
            <div style={{ fontSize: 12, color: C.TEXT2, lineHeight: 1.7 }}>
              标准分析: Offerer 应提议 <strong style={{ color: C.GOLD }}>m* = 0</strong>, Responder 接受所有 <strong style={{ color: C.TEAL }}>t* = 0</strong>.<br/>
              {stats && (
                <span>
                  本轮均值: m̄ = <strong style={{ color: C.GOLD }}>{stats.avgOffer}</strong>, t̄ = <strong style={{ color: C.TEAL }}>{stats.avgThreshold}</strong>.
                  {" "}偏离 SPNE 很远 — 为什么? 公平偏好、spite、情感. (Watson 19.8)
                </span>
              )}
            </div>
          </Box>

          {/* Waiting for next round */}
          <div style={{ background: `${C.RED}0C`, borderRadius: 10, padding: 12, border: `1px solid ${C.RED}20` }}>
            <div style={{ width: 30, height: 30, margin: "0 auto 8px", border: `2px solid ${C.DIM}30`, borderTopColor: C.RED, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 12, color: C.TEXT2 }}>等待下一轮... Waiting for next round...</div>
          </div>
        </div>
      </div>
    );
  }

  // ================================================================
  // LEMONS MARKET — Player Screens
  // ================================================================
  if (screen === "lem_intro") {
    const isPlaying = lemPhase === "playing" && lemRound > 0;
    const isResults = lemPhase === "results" && lemRound > 0;

    if (isPlaying && !lemSubmitted) return renderLemPlay();
    if (isPlaying && lemSubmitted) return renderLemWait();
    if (isResults && lemMyResult) return renderLemResult();
    if (isResults && !lemMyResult) return renderLemWait();

    const isSeller = lemRole === "S";
    const roleColor = isSeller ? C.GOLD : C.TEAL;
    const roleBg = isSeller ? "#2A2008" : C.TEAL_DARK;

    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A1A05)` }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ position: "fixed", top: 14, left: 14, background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer" }}>← Back</button>
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🍋</div>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>柠檬市场</h2>
          <p style={{ fontSize: 13, color: C.GOLD, marginBottom: 20 }}>Lemons Market · Akerlof (1970)</p>

          {/* Role badge */}
          <div style={{ background: `linear-gradient(135deg, ${roleBg}, ${C.BG})`, border: `2px solid ${roleColor}60`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.DIM, letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>Your Role 你的角色</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: roleColor, marginBottom: 4 }}>
              {isSeller ? "🚗 Seller 卖家" : "💵 Buyer 买家"}
            </div>
            <div style={{ fontSize: 11, color: C.TEXT2 }}>
              {isSeller
                ? "You own a used car of unknown quality"

            </div>
          </div>

          <Box style={{ marginBottom: 16, textAlign: "left", border: `1px solid ${C.GOLD}25` }}>

            <div style={{ fontSize: 12, color: C.TEXT, lineHeight: 1.7 }}>

              <table style={{ width: "100%", fontSize: 11, marginBottom: 8, borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: `${C.SURFACE}` }}>
                    <td style={{ padding: 6, color: C.DIM }}></td>
                    <td style={{ padding: 6, color: C.TEXT2, textAlign: "right" }}>Seller value</td>
                    <td style={{ padding: 6, color: C.TEXT2, textAlign: "right" }}>Buyer value</td>
                  </tr>
                </thead>
                <tbody>
                  <tr style={{ borderTop: `1px solid ${C.DIM}20` }}>
                    <td style={{ padding: 6, color: C.GREEN }}>🍑 Peach 高质</td>

                    <td style={{ padding: 6, color: C.TEXT, textAlign: "right" }}>2400</td>
                  </tr>
                  <tr style={{ borderTop: `1px solid ${C.DIM}20` }}>
                    <td style={{ padding: 6, color: C.AMBER }}>🍋 Lemon 次品</td>
                    <td style={{ padding: 6, color: C.TEXT, textAlign: "right" }}>1000</td>
                    <td style={{ padding: 6, color: C.TEXT, textAlign: "right" }}>1200</td>
                  </tr>
                </tbody>
              </table>
              <p style={{ marginBottom: 4 }}>• <strong style={{ color: C.GOLD }}>Seller</strong> 提交 <em>ask</em> 价 (愿意接受的最低价).</p>
              <p style={{ marginBottom: 4 }}>• <strong style={{ color: C.TEAL }}>Buyer</strong> 提交 <em>bid</em> 价 (愿意支付的最高价).</p>
              <p style={{ marginBottom: 4 }}>• 随机 1:1 匹配。若 <strong>bid ≥ ask</strong> → 成交，价格 = (bid+ask)/2.</p>

  // ---- LEMONS PLAY ----
  function renderLemPlay() {
    const isSeller = lemRole === "S";
    const roleColor = isSeller ? C.GOLD : C.TEAL;
    const v = parseInt(lemInputValue);
    const valid = !isNaN(v) && v >= 0 && v <= 3000;

    const sellerVal = isSeller && carType ? LEM_VALS[carType].seller : null;

    // Buyer's expected buyer-value under prior (asym info)
    const expBuyerVal = peachProb * LEM_VALS.peach.buyer + (1 - peachProb) * LEM_VALS.lemon.buyer;

    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A1A05)` }}>

          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 6 }}>

            <Box style={{ marginBottom: 14, padding: 12, background: carType === "peach" ? `${C.GREEN}10` : `${C.AMBER}10`, border: `1px solid ${carType === "peach" ? C.GREEN : C.AMBER}40`, textAlign: "left" }}>

            </Box>

            <Box style={{ marginBottom: 14, padding: 12, background: `${C.TEAL}08`, border: `1px solid ${C.TEAL}30`, textAlign: "left" }}>

                <div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: carType === "peach" ? C.GREEN : C.AMBER }}>

                  <div style={{ fontSize: 11, color: C.TEXT2, marginTop: 4 }}>
                    Your value: <strong style={{ color: C.TEXT }}>{LEM_VALS[carType].buyer}</strong>

                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize: 13, color: C.TEXT, lineHeight: 1.6 }}>

                  </div>
                  <div style={{ fontSize: 11, color: C.TEXT2, marginTop: 6 }}>
                    Expected value to you (random car): <strong style={{ color: C.TEAL }}>{Math.round(expBuyerVal)}</strong>
                  </div>
                  <div style={{ fontSize: 10, color: C.DIM, marginTop: 4, fontStyle: "italic" }}>

                  </div>
                </div>
              )}
            </Box>
          )}

          <Box style={{ marginBottom: 14, padding: 14 }}>
            <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>
              {isSeller ? "你的 ask 价 / Your ask" : "你的 bid 价 / Your bid"}
            </div>
            <input type="number" min="0" max="3000" step="50" value={lemInputValue}

          {valid && !isSeller && (

  // ================================================================
  if (screen === "auct_intro") {
    const isPlaying = auctPhase === "playing" && auctRound > 0;
    const isResults = auctPhase === "results" && auctRound > 0;

    if (isPlaying && !auctSubmitted) return renderAuctPlay();
    if (isPlaying && auctSubmitted) return renderAuctWait();
    if (isResults && auctMyResult) return renderAuctResult();
    if (isResults && !auctMyResult) return renderAuctWait();

    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A0F05)` }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ position: "fixed", top: 14, left: 14, background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer" }}>← Back</button>
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>🎴</div>

          <Box style={{ marginBottom: 16, textAlign: "left", border: `1px solid ${C.RED}25` }}>

              <p style={{ marginBottom: 4 }}>• 袋子里有 <strong>10 张卡牌</strong>，每张是 {"{"}1, 2, …, 10{"}"} 中的随机整数 (可重复)。</p>
              <p style={{ marginBottom: 8, fontSize: 11, color: C.TEXT2, paddingLeft: 10 }}>The bag holds <strong>10 cards</strong>, each an integer drawn i.i.d. from {"{"}1, …, 10{"}"} (with replacement).</p>

              <p style={{ marginBottom: 4 }}>• 袋子的真实价值 <strong style={{ color: C.GOLD }}>V</strong> = 10 张卡的<strong>总和</strong> (取值范围 10–100, 期望 55)。</p>
              <p style={{ marginBottom: 8, fontSize: 11, color: C.TEXT2, paddingLeft: 10 }}>The bag's true value <strong style={{ color: C.GOLD }}>V</strong> = sum of all 10 cards (range 10–100, E[V] = 55).</p>

              <p style={{ marginBottom: 4 }}>• 每位玩家私下随机看到其中的 <strong>2 张卡</strong> — 这是你的私人信号。</p>

              <p style={{ marginBottom: 4 }}>• <strong>赢家收益</strong> = V − 出价。其他人 = 0。</p>

            </div>
          </Box>

          <Box style={{ marginBottom: 16, textAlign: "left", background: `${C.RED}08`, border: `1px solid ${C.RED}25` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 4 }}>🩸 想一想 Think</div>
            <div style={{ fontSize: 11, color: C.TEXT2, lineHeight: 1.6 }}>
              <p style={{ marginBottom: 4 }}>基于你看到的 2 张卡，你怎么估计 V? 而如果你<em>赢了</em>这场拍卖，意味着什么? 这条信息会改变你的估计吗?</p>

            </div>
          </Box>

          <div style={{ background: `${C.RED}0C`, borderRadius: 10, padding: 12, border: `1px solid ${C.RED}20` }}>
            <div style={{ width: 40, height: 40, margin: "0 auto 8px", border: `3px solid ${C.DIM}30`, borderTopColor: C.RED, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 13, color: C.TEXT2 }}>等待老师开始... Waiting for teacher to start...</div>
            <div style={{ fontSize: 10, color: C.DIM, marginTop: 6 }}>已加入 Joined: {auctPlayerCount}</div>
          </div>
        </div>
      </div>
    );
  }

  // ---- AUCTION PLAY ----

    const sig = auctMySignal;

    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A0F05)` }}>
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>

                {sig.map((c, i) => (
                  <div key={i} style={{ width: 72, height: 96, background: `linear-gradient(145deg, ${C.SURFACE}, ${C.BG})`, border: `2px solid ${C.RED}60`, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 38, fontWeight: 900, color: C.GOLD, boxShadow: `0 4px 16px ${C.RED}30` }}>

              style={{ width: "100%", padding: "14px 16px", fontSize: 32, fontWeight: 800, textAlign: "center", background: C.BG, border: `2px solid ${C.RED}40`, borderRadius: 12, color: C.RED, outline: "none" }}

  // ---- AUCTION WAIT ----

    const won = r.isWinner;
    const payoff = r.payoff;
    const bgTint = won ? (payoff >= 0 ? "#0B200F" : "#200B0B") : "#0F0F1A";

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, ${bgTint})`, overflowY: "auto" }}>

          <div className="fade-up" style={{ fontSize: 48, marginBottom: 8 }}>

          <h2 className="fade-up fade-up-1" style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>

          <p className="fade-up fade-up-1" style={{ fontSize: 13, color: won ? (payoff >= 0 ? C.GREEN : C.RED) : C.TEXT2, marginBottom: 20 }}>

          </Box>

          {/* My bid breakdown */}
          <Box className="fade-up fade-up-2" style={{ marginBottom: 14, padding: 14, textAlign: "left", border: `1px solid ${C.RED}30` }}>

          </Box>

          {/* Payoff */}

              <div style={{ fontSize: 10, color: C.DIM }}>你的收益 Your payoff</div>
              <div style={{ fontSize: 44, fontWeight: 800, color: payoff > 0 ? C.GREEN : (payoff < 0 ? C.RED : C.DIM) }}>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 11 }}>

                <div style={{ background: `${C.TEAL}10`, padding: 8, borderRadius: 8, border: `1px solid ${C.TEAL}25` }}>

          {/* Winner's curse punchline */}
          {stats && (

                  <>赢家出价 <strong style={{ color: C.RED }}>{stats.winnerBid}</strong> 高于真实价值 <strong style={{ color: C.GOLD }}>{stats.V}</strong> → 赢家<strong style={{ color: C.RED }}>亏损 {-stats.winnerPayoff}</strong>。赢得意味着你拿到了最高的信号 — 而最高信号往往<em>高估</em>V。理性的赢家应该把出价压低！</>
                ) : (
                  <>这一轮赢家没有 overpay (出价 {stats.winnerBid} ≤ V = {stats.V})。但请看班级平均朴素估计 vs V: 多轮重复后，winner systematically overpays.</>
                )}
              </div>
            </Box>
          )}

          <div style={{ background: `${C.RED}0C`, borderRadius: 10, padding: 12, border: `1px solid ${C.RED}20` }}>
            <div style={{ width: 30, height: 30, margin: "0 auto 8px", border: `2px solid ${C.DIM}30`, borderTopColor: C.RED, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 12, color: C.TEXT2 }}>等待下一轮... Waiting for next round...</div>
          </div>
        </div>
      </div>
    );
  }

  // ================================================================
  // TEACHER PANEL
  // ================================================================
  if (screen === "teacher") {
    const total = stats.alpha + stats.beta;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>🎓 教师面板 Teacher Panel</h2>

          {/* Tab switcher */}
          <div style={{ display: "flex", gap: 4, marginBottom: 20, flexWrap: "wrap" }}>

              <button key={t.id} className="btn-press" onClick={() => { setTeacherTab(t.id); if (t.id === "grade") loadStats(); if (t.id === "nash") loadNashAllStats(); if (t.id === "invest") loadInvestAllResults(); if (t.id === "ultimatum") loadUltAllStats(); if (t.id === "lemons") loadLemAllStats(); if (t.id === "auction") loadAuctAllStats(); }}
                style={{ flex: "1 1 70px", padding: "10px 4px", fontSize: 12, fontWeight: 700, background: teacherTab === t.id ? `${C.GOLD}20` : "transparent", border: teacherTab === t.id ? `1px solid ${C.GOLD}50` : `1px solid ${C.DIM}25`, borderRadius: 10, color: teacherTab === t.id ? C.GOLD : C.DIM, cursor: "pointer" }}>

          {/* ---- GRADE TAB ---- */}

            <div>
              <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>

                <Box style={{ flex: 1, textAlign: "center" }}><div style={{ fontSize: 32, fontWeight: 800, color: C.BETA_C }}>{bR}%</div><div style={{ fontSize: 12, color: C.TEXT2 }}>β ({stats.beta})</div></Box>

                  <div style={{ width: `${bR}%`, background: `linear-gradient(90deg, #7B4FBF, ${C.BETA_C})`, transition: "width 0.6s", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>{bR > 12 ? `β ${bR}%` : ""}</div>
                </div>
              </Box>
              <Box style={{ background: `${C.GOLD}08`, border: `1px solid ${C.GOLD}20`, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 6 }}>📖 对比 Polak (Yale 2007)</div>

              </Box>
              {stats.results.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>最近结果 Recent ({stats.results.length})</div>

                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.DIM}10`, fontSize: 12 }}>
                      <span style={{ color: C.TEXT }}>{r.player}</span>
                      <span style={{ color: r.choice === "α" ? C.ALPHA_C : C.BETA_C, fontWeight: 700 }}>{r.choice}</span>

                <button className="btn-press" onClick={loadStats} style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>🔄 刷新</button>
                <button className="btn-press" onClick={async () => { const pw = prompt("Type 'reset':"); if (pw !== "reset") return; await db.ref(`games/${gameId}`).remove(); setStats({ alpha: 0, beta: 0, results: [] }); alert("✅ Reset!"); }}
                  style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>🗑️ 清除</button>

          )}

          {/* ---- BEAUTY TAB ---- */}
          {teacherTab === "beauty" && (
            <div>
              <Box style={{ marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: C.DIM }}>已提交 Submissions</div>
                <div style={{ fontSize: 36, fontWeight: 800, color: C.PURPLE }}>{beautySubCount}</div>
              </Box>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn-press" onClick={revealBeautyResults}
                  style={{ flex: 1, padding: 12, fontSize: 13, fontWeight: 700, background: `linear-gradient(135deg, #4A3070, #2D1B4E)`, border: "none", borderRadius: 10, color: "white", cursor: "pointer", opacity: beautySubCount > 0 ? 1 : 0.4 }} disabled={beautySubCount === 0}>

                <button className="btn-press" onClick={resetBeautyContest}
                  style={{ padding: 12, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>

                </button>
              </div>
            </div>
          )}

          {/* ---- NASH TAB ---- */}
          {teacherTab === "nash" && (
            <div>
              {/* Status */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>

                    {nashPhase === "playing" ? "进行中 Playing" : nashPhase === "results" ? "已结束 Results" : "等待中 Lobby"}
                  </div>
                </Box>
              </div>

                </button>

                        {latest.info === "full" ? "Full info" : "Asym info"}
                      </span>
                    </div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 12, fontSize: 10, marginBottom: 6 }}>
                      <span style={{ color: C.GREEN }}>■ Peach asks (μ={latest.avgPeachAsk ?? "—"})</span>
                      <span style={{ color: C.AMBER }}>■ Lemon asks (μ={latest.avgLemonAsk ?? "—"})</span>
                      <span style={{ color: C.TEAL }}>■ Bids (μ={latest.avgBid ?? "—"})</span>
                    </div>
                    <svg viewBox="0 0 360 170" style={{ width: "100%" }}>
                      {/* Reference lines at key valuations */}
                      <line x1={20 + (1000 / 3000) * 320} y1={10} x2={20 + (1000 / 3000) * 320} y2={140} stroke={C.AMBER} strokeWidth="1" strokeDasharray="2,2" opacity="0.5" />
                      <line x1={20 + (1200 / 3000) * 320} y1={10} x2={20 + (1200 / 3000) * 320} y2={140} stroke={C.AMBER} strokeWidth="1" strokeDasharray="2,2" opacity="0.5" />
                      <line x1={20 + (2000 / 3000) * 320} y1={10} x2={20 + (2000 / 3000) * 320} y2={140} stroke={C.GREEN} strokeWidth="1" strokeDasharray="2,2" opacity="0.5" />
                      <line x1={20 + (2400 / 3000) * 320} y1={10} x2={20 + (2400 / 3000) * 320} y2={140} stroke={C.GREEN} strokeWidth="1" strokeDasharray="2,2" opacity="0.5" />
                      {/* X-axis ticks */}
                      {[0, 1000, 1500, 2000, 2500, 3000].map(tick => (
                        <g key={tick}>
                          <text x={20 + (tick / 3000) * 320} y={155} textAnchor="middle" fontSize="9" fill={C.DIM}>{tick}</text>
                        </g>
                      ))}
                      {/* Bars (3-way overlay) */}
                      {peachHist && peachHist.map((c, i) => {
                        const x = 20 + i * (320 / NBINS);
                        const w = (320 / NBINS) / 3.5;
                        const h = (c / maxBin) * 120;
                        return c > 0 ? <rect key={`p${i}`} x={x} y={140 - h} width={w} height={h} fill={C.GREEN} opacity="0.85" /> : null;
                      })}
                      {lemonHist && lemonHist.map((c, i) => {
                        const x = 20 + i * (320 / NBINS) + (320 / NBINS) / 3.5;
                        const w = (320 / NBINS) / 3.5;
                        const h = (c / maxBin) * 120;
                        return c > 0 ? <rect key={`l${i}`} x={x} y={140 - h} width={w} height={h} fill={C.AMBER} opacity="0.85" /> : null;
                      })}
                      {bidHist && bidHist.map((c, i) => {
                        const x = 20 + i * (320 / NBINS) + 2 * (320 / NBINS) / 3.5;
                        const w = (320 / NBINS) / 3.5;
                        const h = (c / maxBin) * 120;
                        return c > 0 ? <rect key={`b${i}`} x={x} y={140 - h} width={w} height={h} fill={C.TEAL} opacity="0.85" /> : null;
                      })}
                      {/* Reference labels */}
                      <text x={20 + (1000 / 3000) * 320} y={12} textAnchor="middle" fontSize="7" fill={C.AMBER}>L_s=1000</text>
                      <text x={20 + (2000 / 3000) * 320} y={12} textAnchor="middle" fontSize="7" fill={C.GREEN}>P_s=2000</text>
                    </svg>

                    {/* Trade rate by type */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20`, fontSize: 10 }}>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.GREEN }}>🍑 Peach trade</div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: latest.peachTradeRate >= 50 ? C.GREEN : C.RED }}>
                          {latest.peachTradeRate}%
                        </div>
                        <div style={{ color: C.DIM }}>{latest.peachTraded}/{latest.peachCount}</div>
                      </div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.AMBER }}>🍋 Lemon trade</div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: latest.lemonTradeRate >= 50 ? C.GREEN : C.RED }}>
                          {latest.lemonTradeRate}%
                        </div>
                        <div style={{ color: C.DIM }}>{latest.lemonTraded}/{latest.lemonCount}</div>
                      </div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.TEXT2 }}>Avg price</div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: C.TEXT }}>
                          {latest.avgPrice ?? "—"}
                        </div>
                        <div style={{ color: C.DIM }}>n={latest.matches}</div>
                      </div>
                    </div>
                  </Box>
                )}

                {/* Multi-round summary */}
                {lemAllStats.length > 0 && (
                  <Box>
                    <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>各轮对比 / Round-by-round</div>
                    <table style={{ width: "100%", fontSize: 10, borderCollapse: "collapse" }}>
                      <thead>
                        <tr>
                          <td style={{ padding: 3, fontWeight: 700, color: C.DIM }}>R</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.DIM }}>Info</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.GREEN }}>🍑 ask</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.AMBER }}>🍋 ask</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.TEAL }}>μ Bid</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.GREEN }}>🍑 %</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.AMBER }}>🍋 %</td>
                        </tr>
                      </thead>
                      <tbody>
                        {lemAllStats.map((s, i) => (
                          <tr key={i} style={{ borderTop: `1px solid ${C.DIM}15` }}>
                            <td style={{ padding: 3, color: C.TEXT }}>{s.round}</td>
                            <td style={{ padding: 3, color: s.info === "full" ? C.GREEN : C.RED }}>
                              {s.info === "full" ? "F" : "A"}
                            </td>
                            <td style={{ padding: 3, color: C.TEXT2 }}>{s.avgPeachAsk ?? "—"}</td>
                            <td style={{ padding: 3, color: C.TEXT2 }}>{s.avgLemonAsk ?? "—"}</td>
                            <td style={{ padding: 3, color: C.TEXT2 }}>{s.avgBid ?? "—"}</td>
                            <td style={{ padding: 3, color: s.peachTradeRate >= 50 ? C.GREEN : C.RED, fontWeight: 700 }}>{s.peachTradeRate}%</td>
                            <td style={{ padding: 3, color: s.lemonTradeRate >= 50 ? C.GREEN : C.RED, fontWeight: 700 }}>{s.lemonTradeRate}%</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </Box>
                )}

                <button className="btn-press" onClick={loadLemAllStats} style={{ width: "100%", padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer", marginTop: 12 }}>
                  🔄 刷新数据 Refresh
                </button>
              </div>
            );
          })()}

          {teacherTab === "auction" && (() => {
            const latest = auctAllStats.length > 0 ? auctAllStats[auctAllStats.length - 1] : null;
            // Histogram of bids (0–100, 10 bins of 10)
            const NBINS = 10;
            const BINW = 10;
            const makeBidHist = (raw) => {
              const values = raw == null ? [] : (Array.isArray(raw) ? raw : Object.values(raw));
              const counts = Array(NBINS).fill(0);
              values.forEach(v => {
                if (typeof v !== "number") return;
                const idx = Math.min(Math.floor(v / BINW), NBINS - 1);
                counts[idx]++;
              });
              return counts;
            };
            const bidHist = latest ? makeBidHist(latest.bids) : null;
            const maxBin = Math.max(...(bidHist || [1]), 1);
            // Cumulative winner's-curse line: across rounds, plot winner payoff
            const curseSeries = auctAllStats.map(s => s.winnerPayoff);
            const avgCurse = curseSeries.length ? curseSeries.reduce((a, b) => a + b, 0) / curseSeries.length : null;

            return (
              <div>
                {/* Status */}
                <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
                  <Box style={{ flex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: C.DIM }}>轮次 Round</div>
                    <div style={{ fontSize: 32, fontWeight: 800, color: C.RED }}>{auctRound || "—"}</div>
                  </Box>
                  <Box style={{ flex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: C.DIM }}>阶段 Phase</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: auctPhase === "playing" ? C.GREEN : auctPhase === "results" ? C.GOLD : C.DIM, marginTop: 6 }}>
                      {auctPhase === "playing" ? "进行中" : auctPhase === "results" ? "已揭晓" : "等待中"}
                    </div>
                  </Box>
                  <Box style={{ flex: 1, textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: C.DIM }}>玩家 Players</div>
                    <div style={{ fontSize: 22, fontWeight: 800, color: C.RED, marginTop: 4 }}>{auctPlayerCount}</div>
                    {auctPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {auctSubCount}</div>}
                  </Box>
                </div>

                {/* Controls */}
                <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
                  {(auctPhase === "lobby" || auctPhase === "results") && (
                    <button className="btn-press" onClick={() => auctStartRound((auctRound || 0) + 1)}
                      style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A08, #1A0F05)`, border: `1px solid ${C.RED}50`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                      ▶️ {auctRound ? `开始第 ${auctRound + 1} 轮` : "开始第 1 轮"}
                    </button>
                  )}
                  {auctPhase === "playing" && (
                    <button className="btn-press" onClick={auctEndRound}
                      style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A0F, #1A1008)`, border: `1px solid ${C.AMBER}50`, borderRadius: 12, color: C.AMBER, cursor: "pointer" }}>
                      ⏹️ 结束 & 开标
                    </button>
                  )}
                  <button className="btn-press" onClick={auctResetGame}
                    style={{ padding: 14, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                    🗑️
                  </button>
                </div>

                {/* Latest round: bag, V, bid histogram */}
                {latest && (
                  <Box style={{ marginBottom: 14, border: `1px solid ${C.RED}20` }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.RED, marginBottom: 8 }}>
                      🎴 第 {latest.round} 轮 / Round {latest.round} · True V = <span style={{ color: C.GOLD }}>{latest.V}</span>
                    </div>

                    {/* Bag reveal */}
                    {Array.isArray(latest.bag) && (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 4, justifyContent: "center", marginBottom: 10 }}>
                        {latest.bag.map((c, i) => (
                          <div key={i} style={{ width: 26, height: 36, background: C.SURFACE, border: `1px solid ${C.GOLD}40`, borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, color: C.GOLD }}>
                            {c}
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Bid histogram */}
                    <div style={{ fontSize: 10, color: C.TEXT2, marginBottom: 4 }}>
                      <span style={{ color: C.TEAL }}>■ Bids (μ={latest.avgBid})</span>
                      {" · "}
                      <span style={{ color: C.GOLD }}>V dashed line</span>
                      {" · "}
                      <span style={{ color: C.RED }}>winner bid = {latest.winnerBid}</span>
                    </div>
                    <svg viewBox="0 0 360 170" style={{ width: "100%" }}>
                      {/* X-axis ticks */}
                      {[0, 25, 50, 75, 100].map(tick => (
                        <g key={tick}>
                          <text x={20 + (tick / 100) * 320} y={155} textAnchor="middle" fontSize="9" fill={C.DIM}>{tick}</text>
                        </g>
                      ))}
                      {/* V reference line */}
                      <line x1={20 + (latest.V / 100) * 320} y1={10} x2={20 + (latest.V / 100) * 320} y2={140} stroke={C.GOLD} strokeWidth="2" strokeDasharray="3,3" opacity="0.85" />
                      <text x={20 + (latest.V / 100) * 320} y={12} textAnchor="middle" fontSize="8" fill={C.GOLD}>V={latest.V}</text>
                      {/* Winner bid reference line */}
                      <line x1={20 + (latest.winnerBid / 100) * 320} y1={10} x2={20 + (latest.winnerBid / 100) * 320} y2={140} stroke={C.RED} strokeWidth="2" opacity="0.7" />
                      <text x={20 + (latest.winnerBid / 100) * 320} y={148} textAnchor="middle" fontSize="8" fill={C.RED}>win</text>
                      {/* Bid bars */}
                      {bidHist && bidHist.map((c, i) => {
                        const x = 20 + i * (320 / NBINS) + 2;
                        const w = (320 / NBINS) - 4;
                        const h = (c / maxBin) * 120;
                        return c > 0 ? <rect key={`b${i}`} x={x} y={140 - h} width={w} height={h} fill={C.TEAL} opacity="0.85" /> : null;
                      })}
                    </svg>

                    {/* Winner box */}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.DIM}20`, fontSize: 10 }}>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.RED }}>🏆 Winner</div>
                        <div style={{ fontSize: 12, fontWeight: 800, color: C.TEXT, marginTop: 2 }}>
                          {latest.winnerName || "—"}
                        </div>
                        {latest.winnerSignal && (
                          <div style={{ color: C.DIM, fontSize: 9 }}>signal: {latest.winnerSignal.join("·")}</div>
                        )}
                      </div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.TEXT2 }}>Win bid vs V</div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: latest.winnerBid > latest.V ? C.RED : C.GREEN }}>
                          {latest.winnerBid} {latest.winnerBid > latest.V ? ">" : latest.winnerBid < latest.V ? "<" : "="} {latest.V}
                        </div>
                      </div>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ color: C.TEXT2 }}>Winner payoff</div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: latest.winnerPayoff >= 0 ? C.GREEN : C.RED }}>
                          {latest.winnerPayoff > 0 ? "+" : ""}{latest.winnerPayoff}
                        </div>
                      </div>
                    </div>
                  </Box>
                )}

                {/* Multi-round summary */}
                {auctAllStats.length > 0 && (
                  <Box>
                    <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>各轮对比 / Round-by-round</div>
                    <table style={{ width: "100%", fontSize: 10, borderCollapse: "collapse" }}>
                      <thead>
                        <tr>
                          <td style={{ padding: 3, fontWeight: 700, color: C.DIM }}>R</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.GOLD }}>V</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.RED }}>Win bid</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.TEAL }}>μ Bid</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.GOLD }}>μ Naive</td>
                          <td style={{ padding: 3, fontWeight: 700, color: C.GREEN }}>Winner π</td>
                        </tr>
                      </thead>
                      <tbody>
                        {auctAllStats.map((s, i) => (
                          <tr key={i} style={{ borderTop: `1px solid ${C.DIM}15` }}>
                            <td style={{ padding: 3, color: C.TEXT }}>{s.round}</td>
                            <td style={{ padding: 3, color: C.GOLD }}>{s.V}</td>
                            <td style={{ padding: 3, color: s.winnerBid > s.V ? C.RED : C.TEXT2 }}>{s.winnerBid}</td>
                            <td style={{ padding: 3, color: C.TEXT2 }}>{s.avgBid}</td>
                            <td style={{ padding: 3, color: C.TEXT2 }}>{s.avgNaiveEst}</td>
                            <td style={{ padding: 3, color: s.winnerPayoff >= 0 ? C.GREEN : C.RED, fontWeight: 700 }}>
                              {s.winnerPayoff > 0 ? "+" : ""}{s.winnerPayoff}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {avgCurse != null && (
                      <div style={{ marginTop: 10, paddingTop: 8, borderTop: `1px solid ${C.DIM}20`, fontSize: 11, color: C.TEXT2, textAlign: "center" }}>
                        Avg winner payoff across {auctAllStats.length} round{auctAllStats.length === 1 ? "" : "s"}:
                        {" "}<strong style={{ color: avgCurse >= 0 ? C.GREEN : C.RED, fontSize: 14 }}>
                          {avgCurse > 0 ? "+" : ""}{Math.round(avgCurse * 10) / 10}
                        </strong>
                        {avgCurse < 0 && <span style={{ color: C.RED }}> 🩸 winner's curse</span>}
                      </div>
                    )}
                  </Box>
                )}

                <button className="btn-press" onClick={loadAuctAllStats} style={{ width: "100%", padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer", marginTop: 12 }}>
                  🔄 刷新数据 Refresh
                </button>
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  // ---- HISTORY ----
  if (screen === "history") return (
    <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>📊 历史记录 History</h2>
        {stats.results.length === 0 ? (
          <p style={{ color: C.DIM, fontSize: 13 }}>还没有记录。</p>
        ) : stats.results.map((r, i) => (
          <Box key={i} style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.TEXT }}>{r.player}</div>
              <div style={{ fontSize: 10, color: C.DIM }}>{r.choice} vs {r.opponent}({r.oppChoice})</div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: r.payoff >= 0 ? C.GREEN : C.RED }}>{r.payoff > 0 ? "+" : ""}{r.payoff}</div>
          </Box>
        ))}
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById("app"));
</script>
</body>
</html>
