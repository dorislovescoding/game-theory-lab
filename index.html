// AI — Claude via Anthropic API
async function getClaudeChoice(game, history) {
  try {
    const historyStr = history.length > 0
      ? "Previous rounds: " + history.map((h, i) => `Round ${i+1}: human=${h.mine}, AI=${h.opp}`).join("; ")
      : "This is the first round.";
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are playing a game theory game called "${game.name}" against a human student.
Available strategies: ${game.strategies.join(", ")}
OUTCOME matrix (grades, NOT payoffs):
  α,α → B−, B−
  α,β → A, C  
  β,α → C, A
  β,β → B+, B+
IMPORTANT: These are OUTCOMES (grades), not payoffs. The payoffs depend on PREFERENCES. 
${historyStr}
You must decide what kind of player you are and choose accordingly.
Respond in EXACTLY this JSON format, nothing else:
{"choice":"α or β","reasoning_cn":"2-4句中文。","reasoning_en":"2-4 sentences in English."}`
        }]
      })
    });
    const data = await response.json();
    const text = (data.content?.[0]?.text || "").trim();
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (game.strategies.includes(parsed.choice)) {
        return { choice: parsed.choice, reasoningCN: parsed.reasoning_cn, reasoningEN: parsed.reasoning_en };
      }
    } catch {}
    for (const s of game.strategies) {
      if (text.includes(s)) return { choice: s, reasoningCN: "AI选择了策略 " + s, reasoningEN: "AI chose strategy " + s };
    }
    return { choice: game.strategies[0], reasoningCN: "（分析不可用）", reasoningEN: "(Analysis unavailable)" };
  } catch (e) {
    console.error("Claude API error:", e);
    const fallback = game.strategies[Math.floor(Math.random() * game.strategies.length)];
    return { choice: fallback, reasoningCN: "（API连接失败，随机选择）", reasoningEN: "(API connection failed, random choice)" };
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ================================================================
function App() {
  // ---- Shared state ----
  const [screen, setScreen] = useState("home");
  const [gameId, setGameId] = useState("grade_game");
  const [name, setName] = useState(() => { try { return localStorage.getItem("gt_name") || ""; } catch { return ""; } });
  const [studentId, setStudentId] = useState(() => { try { return localStorage.getItem("gt_sid") || ""; } catch { return ""; } });
  const [sessionCode, setSessionCode] = useState("");
  const [section, setSection] = useState("");

  // ---- Grade Game state ----
  const [mode, setMode] = useState("human");
  const [waiting, setWaiting] = useState(false);
  const [choice, setChoice] = useState(null);
  const [result, setResult] = useState(null);
  const [showMatrix, setShowMatrix] = useState(false);
  const [aiHistory, setAiHistory] = useState([]);
  const [stats, setStats] = useState({ alpha: 0, beta: 0, results: [] });
  const [countdown, setCountdown] = useState(0);

  // ---- Beauty Contest state ----
  const [beautyNumber, setBeautyNumber] = useState("");
  const [beautyResult, setBeautyResult] = useState(null);
  const [beautySubmitted, setBeautySubmitted] = useState(false);
  const [beautySubCount, setBeautySubCount] = useState(0);

  // ---- Nash Game state ----
  const [nashRole, setNashRole] = useState(null); // "P1" or "P2"
  const [nashPhase, setNashPhase] = useState("lobby"); // "lobby" | "playing" | "results"
  const [nashRound, setNashRound] = useState(0);
  const [nashSubmitted, setNashSubmitted] = useState(false);
  const [nashMyResult, setNashMyResult] = useState(null);
  const [nashHistory, setNashHistory] = useState([]); // [{round, myChoice, oppChoice, myPay, oppPay, oppName}]
  const [nashSubCounts, setNashSubCounts] = useState({ p1: 0, p2: 0 });
  const [nashPlayerCounts, setNashPlayerCounts] = useState({ p1: 0, p2: 0 });
  const [nashRoundStats, setNashRoundStats] = useState(null); // current round stats
  const [nashAllStats, setNashAllStats] = useState([]); // [{round, p1: {U,M,D}, p2: {L,R}}]
  const [nashTeacherTab, setNashTeacherTab] = useState("controls");

  const game = GAMES[gameId];
  const myId = useRef(generateId());
  const nashId = useRef(() => {
    try {
      let id = localStorage.getItem("gt_nash_id");
      if (!id) { id = generateId(); localStorage.setItem("gt_nash_id", id); }
      return id;
    } catch { return generateId(); }
  });
  // Initialize nashId properly
  if (typeof nashId.current === "function") nashId.current = nashId.current();

  const listenersRef = useRef([]);

  // Save name & student ID
  useEffect(() => { try { if (name) localStorage.setItem("gt_name", name); } catch {} }, [name]);
  useEffect(() => { try { if (studentId) localStorage.setItem("gt_sid", studentId); } catch {} }, [studentId]);

  // Cleanup firebase listeners on unmount
  useEffect(() => { return () => listenersRef.current.forEach(off => off()); }, []);

  // Beauty contest submission count listener
  useEffect(() => {
    if (!firebaseReady) return;
    const subRef = db.ref("games/beauty_contest/submissions");
    const onSub = subRef.on("value", (snap) => {
      const subs = snap.val();
      setBeautySubCount(subs ? Object.keys(subs).length : 0);
    });
    return () => subRef.off("value", onSub);
  }, [firebaseReady]);

  // ================================================================
  // NASH GAME — Firebase listeners
  // ================================================================
  const nashListenersRef = useRef([]);

  // Listen for game state changes (round, phase)
  useEffect(() => {
    if (!firebaseReady) return;
    const stateRef = db.ref("games/nash_game/state");
    const onState = stateRef.on("value", (snap) => {
      const s = snap.val();
      if (!s) { setNashPhase("lobby"); setNashRound(0); return; }
      setNashPhase(s.phase || "lobby");
      setNashRound(s.round || 0);
    });
    nashListenersRef.current.push(() => stateRef.off("value", onState));

    // Listen for player counts
    const playersRef = db.ref("games/nash_game/players");
    const onPlayers = playersRef.on("value", (snap) => {
      const p = snap.val() || {};
      const vals = Object.values(p);
      setNashPlayerCounts({
        p1: vals.filter(v => v.role === "P1").length,
        p2: vals.filter(v => v.role === "P2").length,
      });
    });
    nashListenersRef.current.push(() => playersRef.off("value", onPlayers));

    return () => nashListenersRef.current.forEach(off => off());
  }, [firebaseReady]);

  // Listen for submission counts in current round
  useEffect(() => {
    if (!firebaseReady || !nashRound) return;
    const subRef = db.ref(`games/nash_game/rounds/${nashRound}/submissions`);
    const onSub = subRef.on("value", (snap) => {
      const s = snap.val() || {};
      const vals = Object.values(s);
      setNashSubCounts({
        p1: vals.filter(v => v.role === "P1").length,
        p2: vals.filter(v => v.role === "P2").length,
      });
    });
    return () => subRef.off("value", onSub);
  }, [firebaseReady, nashRound]);

  // Listen for my match result when phase changes to "results"
  useEffect(() => {
    if (!firebaseReady || nashPhase !== "results" || !nashRound) return;
    const resRef = db.ref(`games/nash_game/rounds/${nashRound}/playerResults/${nashId.current}`);
    resRef.once("value", (snap) => {
      const r = snap.val();
      if (r) {
        setNashMyResult(r);
        // Add to history if not already there
        setNashHistory(prev => {
          if (prev.find(h => h.round === nashRound)) return prev;
          return [...prev, { round: nashRound, ...r }];
        });
      }
    });
    // Also load round stats
    const statsRef = db.ref(`games/nash_game/rounds/${nashRound}/stats`);
    statsRef.once("value", (snap) => {
      const s = snap.val();
      if (s) {
        setNashRoundStats(s);
        setNashAllStats(prev => {
          const filtered = prev.filter(x => x.round !== nashRound);
          return [...filtered, { round: nashRound, ...s }].sort((a, b) => a.round - b.round);
        });
      }
    });
  }, [firebaseReady, nashPhase, nashRound]);

  // When new round starts (phase back to "playing"), reset submitted
  useEffect(() => {
    if (nashPhase === "playing") {
      setNashSubmitted(false);
      setNashMyResult(null);
      setNashRoundStats(null);
    }
  }, [nashPhase, nashRound]);

  // Load all historical stats for teacher chart
  const loadNashAllStats = async () => {
    if (!firebaseReady) return;
    const snap = await db.ref("games/nash_game/rounds").once("value");
    const rounds = snap.val() || {};
    const allStats = [];
    for (const [roundNum, roundData] of Object.entries(rounds)) {
      if (roundData.stats) {
        allStats.push({ round: parseInt(roundNum), ...roundData.stats });
      }
    }
    setNashAllStats(allStats.sort((a, b) => a.round - b.round));
  };

  // ================================================================
  // NASH GAME — Player functions
  // ================================================================
  const joinNashGame = async () => {
    if (!firebaseReady) return;
    // Check if already joined
    const existSnap = await db.ref(`games/nash_game/players/${nashId.current}`).once("value");
    if (existSnap.val()) {
      setNashRole(existSnap.val().role);
      setScreen("nash_lobby");
      return;
    }
    // Assign role based on current counts
    const playersSnap = await db.ref("games/nash_game/players").once("value");
    const players = playersSnap.val() || {};
    const vals = Object.values(players);
    const p1Count = vals.filter(v => v.role === "P1").length;
    const p2Count = vals.filter(v => v.role === "P2").length;
    const role = p1Count <= p2Count ? "P1" : "P2";

    await db.ref(`games/nash_game/players/${nashId.current}`).set({
      name: name || "匿名", studentId: studentId || "", role,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    setNashRole(role);
    setScreen("nash_lobby");
  };

  const submitNashChoice = async (myChoice) => {
    if (!firebaseReady || !nashRound || nashSubmitted) return;
    await db.ref(`games/nash_game/rounds/${nashRound}/submissions/${nashId.current}`).set({
      choice: myChoice, role: nashRole, name: name || "匿名",
      studentId: studentId || "",
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    setNashSubmitted(true);
  };

  // ================================================================
  // NASH GAME — Teacher functions
  // ================================================================
  const nashStartRound = async (roundNum) => {
    if (!firebaseReady) return;
    await db.ref("games/nash_game/state").set({ round: roundNum, phase: "playing" });
  };

  const nashEndRound = async () => {
    if (!firebaseReady || !nashRound) return;
    // Read submissions
    const snap = await db.ref(`games/nash_game/rounds/${nashRound}/submissions`).once("value");
    const subs = snap.val();
    if (!subs) { alert("没有提交 No submissions!"); return; }

    const entries = Object.entries(subs);
    const p1Subs = shuffle(entries.filter(([_, v]) => v.role === "P1"));
    const p2Subs = shuffle(entries.filter(([_, v]) => v.role === "P2"));

    if (p1Subs.length === 0 || p2Subs.length === 0) {
      alert("需要至少一个P1和一个P2! Need at least one P1 and one P2!");
      return;
    }

    // Compute stats
    const statsData = {
      p1: { U: 0, M: 0, D: 0, total: p1Subs.length },
      p2: { L: 0, R: 0, total: p2Subs.length },
    };
    p1Subs.forEach(([_, v]) => { if (statsData.p1[v.choice] !== undefined) statsData.p1[v.choice]++; });
    p2Subs.forEach(([_, v]) => { if (statsData.p2[v.choice] !== undefined) statsData.p2[v.choice]++; });

    // Match: pair each player with a random opponent
    const playerResults = {};
    // Match all P1 players
    for (const [p1Id, p1Data] of p1Subs) {
      const randP2 = p2Subs[Math.floor(Math.random() * p2Subs.length)];
      const key = `${p1Data.choice},${randP2[1].choice}`;
      const pay = NASH.PAYOFFS[key];
      playerResults[p1Id] = {
        myChoice: p1Data.choice, oppChoice: randP2[1].choice,
        oppName: randP2[1].name, myPayoff: pay.p1, oppPayoff: pay.p2, myRole: "P1",
      };
    }
    // Match all P2 players
    for (const [p2Id, p2Data] of p2Subs) {
      const randP1 = p1Subs[Math.floor(Math.random() * p1Subs.length)];
      const key = `${randP1[1].choice},${p2Data.choice}`;
      const pay = NASH.PAYOFFS[key];
      playerResults[p2Id] = {
        myChoice: p2Data.choice, oppChoice: randP1[1].choice,
        oppName: randP1[1].name, myPayoff: pay.p2, oppPayoff: pay.p1, myRole: "P2",
      };
    }

    // Write results
    const updates = {};
    updates[`games/nash_game/rounds/${nashRound}/playerResults`] = playerResults;
    updates[`games/nash_game/rounds/${nashRound}/stats`] = statsData;
    updates["games/nash_game/state/phase"] = "results";
    await db.ref().update(updates);

    await loadNashAllStats();
    alert(`✅ Round ${nashRound} matched! P1: ${p1Subs.length}, P2: ${p2Subs.length}`);
  };

  const nashNextRound = async () => {
    await nashStartRound(nashRound + 1);
  };

  const nashResetGame = async () => {
    if (!firebaseReady) return;
    const pw = prompt("确认重置纳什博弈？输入 reset\nReset Nash Game? Type 'reset':");
    if (pw !== "reset") return;
    await db.ref("games/nash_game").remove();
    setNashRole(null);
    setNashPhase("lobby");
    setNashRound(0);
    setNashSubmitted(false);
    setNashMyResult(null);
    setNashHistory([]);
    setNashAllStats([]);
    setNashSubCounts({ p1: 0, p2: 0 });
    setNashPlayerCounts({ p1: 0, p2: 0 });
    // Clear stored nash ID so students get fresh roles
    try { localStorage.removeItem("gt_nash_id"); } catch {}
    nashId.current = generateId();
    try { localStorage.setItem("gt_nash_id", nashId.current); } catch {}
    alert("✅ 纳什博弈已重置 Nash Game reset!");

  // ================================================================
  // GRADE GAME — Human matching (unchanged)
  // ================================================================
  const submitHuman = async (myChoice) => {
    if (!firebaseReady) { alert("Firebase 未配置！"); return; }
    setChoice(myChoice);
    setWaiting(true);
    const myRef = db.ref(`games/${gameId}/pending/${myId.current}`);
    await myRef.set({
      name: name || "匿名", studentId: studentId || "",
      choice: myChoice, timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    let timeLeft = 30;
    setCountdown(timeLeft);
    const timer = setInterval(() => { timeLeft--; setCountdown(timeLeft); if (timeLeft <= 0) clearInterval(timer); }, 1000);

    setTimeout(() => {
      const matchRef = db.ref(`games/${gameId}/matches/${myId.current}`);
      const onMatch = matchRef.on("value", (snap) => {
        const match = snap.val();
        if (!match) return;
        matchRef.off("value", onMatch);
        const key = `${myChoice},${match.opponentChoice}`;
        const po = game.payoffs[key];
        setResult({ myChoice, oppChoice: match.opponentChoice, oppName: match.opponentName, label: po.label, myPay: po.p1, oppPay: po.p2, key });
        setWaiting(false); setCountdown(0); setScreen("result");
        db.ref(`games/${gameId}/results`).push({
          player: name || "匿名", studentId: studentId || "",
          choice: myChoice, opponent: match.opponentName, oppChoice: match.opponentChoice,
          payoff: po.p1, timestamp: firebase.database.ServerValue.TIMESTAMP,
        });
      });
      listenersRef.current.push(() => matchRef.off("value", onMatch));
    }, 30000);

    setTimeout(async () => {
      const myMatchSnap = await db.ref(`games/${gameId}/matches/${myId.current}`).once("value");
      if (myMatchSnap.val()) return;
      const snap = await db.ref(`games/${gameId}/pending`).once("value");
      const pending = snap.val();
      if (!pending) { setWaiting(false); setCountdown(0); alert("没有其他人提交。"); setScreen("play"); setChoice(null); return; }
      const others = Object.entries(pending).filter(([id]) => id !== myId.current);
      if (others.length === 0) { myRef.remove(); setWaiting(false); setCountdown(0); alert("没有找到对手。"); setScreen("play"); setChoice(null); return; }
      const [oppId, oppData] = others[Math.floor(Math.random() * others.length)];
      const updates = {};
      updates[`games/${gameId}/pending/${myId.current}`] = null;
      updates[`games/${gameId}/matches/${myId.current}`] = { opponentChoice: oppData.choice, opponentName: oppData.name };
      const oppMatchSnap = await db.ref(`games/${gameId}/matches/${oppId}`).once("value");
      if (!oppMatchSnap.val()) {
        updates[`games/${gameId}/pending/${oppId}`] = null;
        updates[`games/${gameId}/matches/${oppId}`] = { opponentChoice: myChoice, opponentName: name || "匿名" };
      }
      try { await db.ref().update(updates); } catch (e) { console.log("Match conflict"); }
    }, 30000);
  };

  const submitAI = async (myChoice) => {
    setChoice(myChoice); setWaiting(true);
    const aiResult = await getClaudeChoice(game, aiHistory);
    const key = `${myChoice},${aiResult.choice}`;
    const po = game.payoffs[key];
    setAiHistory(prev => [...prev, { mine: myChoice, opp: aiResult.choice }]);
    setResult({ myChoice, oppChoice: aiResult.choice, oppName: "Claude AI", label: po.label, myPay: po.p1, oppPay: po.p2, key, aiReasoningCN: aiResult.reasoningCN, aiReasoningEN: aiResult.reasoningEN });
    setWaiting(false); setScreen("result");
  };

  const handleChoice = (c) => { if (mode === "ai") submitAI(c); else submitHuman(c); };

  const loadStats = () => {

      const data = snap.val() || {};
      const results = Object.values(data).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
      setStats({ alpha: results.filter(r => r.choice === "α").length, beta: results.filter(r => r.choice === "β").length, results });
    });

  // Beauty Contest functions
  const submitBeauty = async () => {
    const num = parseInt(beautyNumber);
    if (isNaN(num) || num < 0 || num > 100) { alert("请输入0-100的整数"); return; }
    if (!firebaseReady) return;
    await db.ref("games/beauty_contest/submissions/" + myId.current).set({
      name: name || "匿名", studentId: studentId || "", number: num,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    setBeautySubmitted(true);
    setScreen("beauty_wait");
    const resultsRef = db.ref("games/beauty_contest/results");
    const onResults = resultsRef.on("value", (snap) => {
      const res = snap.val();
      if (!res) return;
      resultsRef.off("value", onResults);
      setBeautyResult({ myNumber: num, avg: res.avg, target: res.target, totalPlayers: res.totalPlayers, winner: res.winner, winnerNumber: res.winnerNumber, isWinner: res.winnerStudentId === studentId, allNumbers: res.allNumbers });
      setScreen("beauty_result");
    });
    listenersRef.current.push(() => resultsRef.off("value", onResults));

  const revealBeautyResults = async () => {
    if (!firebaseReady) return;
    const snap = await db.ref("games/beauty_contest/submissions").once("value");
    const subs = snap.val();
    if (!subs) { alert("没有提交!"); return; }
    const entries = Object.values(subs);
    const numbers = entries.map(e => e.number);
    const avg = numbers.reduce((a, b) => a + b, 0) / numbers.length;
    const target = (2 / 3) * avg;
    let closest = entries[0], minDist = Math.abs(entries[0].number - target);
    entries.forEach(e => { const dist = Math.abs(e.number - target); if (dist < minDist) { minDist = dist; closest = e; } });
    await db.ref("games/beauty_contest/results").set({
      avg: avg.toFixed(1), target: target.toFixed(1), totalPlayers: entries.length,
      winner: closest.name, winnerNumber: closest.number, winnerStudentId: closest.studentId || "",
      allNumbers: numbers.sort((a, b) => a - b), timestamp: firebase.database.ServerValue.TIMESTAMP,
    });
    alert(`✅ Results published! ${entries.length} players, avg=${avg.toFixed(1)}, target=${target.toFixed(1)}`);

  // Convergence chart SVG
  const ConvergenceChart = ({ allStats }) => {
    if (allStats.length === 0) return <div style={{ fontSize: 12, color: C.DIM, textAlign: "center", padding: 20 }}>暂无数据 No data yet</div>;
    const W = 320, H = 160, PAD = 36, PADR = 16;
    const maxR = Math.max(...allStats.map(s => s.round), 1);
    const xScale = (r) => PAD + (r - 1) / Math.max(maxR - 1, 1) * (W - PAD - PADR);
    const yScale = (pct) => H - PAD - (pct / 100) * (H - PAD - 12);

    const uLine = allStats.map(s => {
      const total = (s.p1?.total || s.p1?.U + s.p1?.M + s.p1?.D) || 1;
      const pct = ((s.p1?.U || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };
    });
    const rLine = allStats.map(s => {
      const total = (s.p2?.total || s.p2?.L + s.p2?.R) || 1;
      const pct = ((s.p2?.R || 0) / total) * 100;
      return { x: xScale(s.round), y: yScale(pct), pct };
    });

    const pathStr = (pts) => pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ");

    return (
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", maxWidth: 360 }}>
        {/* Grid */}
        {[0, 25, 50, 75, 100].map(v => (
          <g key={v}>
            <line x1={PAD} y1={yScale(v)} x2={W - PADR} y2={yScale(v)} stroke={`${C.DIM}25`} strokeWidth="0.5" />
            <text x={PAD - 4} y={yScale(v) + 3} textAnchor="end" fontSize="8" fill={C.DIM}>{v}%</text>
          </g>
        ))}
        {/* 100% target line */}
        <line x1={PAD} y1={yScale(100)} x2={W - PADR} y2={yScale(100)} stroke={`${C.TEAL}30`} strokeWidth="1" strokeDasharray="4,3" />
        {/* Lines */}
        {uLine.length > 1 && <path d={pathStr(uLine)} fill="none" stroke={C.AMBER} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
        {rLine.length > 1 && <path d={pathStr(rLine)} fill="none" stroke={C.TEAL} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />}
        {/* Dots */}
        {uLine.map((p, i) => <circle key={`u${i}`} cx={p.x} cy={p.y} r="4" fill={C.AMBER} />)}
        {rLine.map((p, i) => <circle key={`r${i}`} cx={p.x} cy={p.y} r="4" fill={C.TEAL} />)}
        {/* Labels on last dot */}
        {uLine.length > 0 && <text x={uLine[uLine.length-1].x + 6} y={uLine[uLine.length-1].y + 3} fontSize="9" fontWeight="700" fill={C.AMBER}>{Math.round(uLine[uLine.length-1].pct)}%</text>}
        {rLine.length > 0 && <text x={rLine[rLine.length-1].x + 6} y={rLine[rLine.length-1].y + 3} fontSize="9" fontWeight="700" fill={C.TEAL}>{Math.round(rLine[rLine.length-1].pct)}%</text>}
        {/* X axis labels */}
        {allStats.map((s, i) => (
          <text key={i} x={xScale(s.round)} y={H - 8} textAnchor="middle" fontSize="9" fill={C.DIM}>R{s.round}</text>
        ))}
        {/* Legend */}
        <circle cx={PAD + 4} cy={8} r="3.5" fill={C.AMBER} />

        <p style={{ fontSize: 12, color: C.DIM, margin: "8px 0 28px" }}></p>

        {!firebaseReady && (

  // ---- GRADE GAME RESULT ----
  if (screen === "result" && result) {

  // ---- BEAUTY CONTEST SCREENS (unchanged) ----
  if (screen === "beauty_intro") return (

      </div>

  if (screen === "beauty_play") return (

  if (screen === "beauty_result" && beautyResult) return (

        <div style={{ fontSize: 42, marginBottom: 8 }}>{beautyResult.isWinner ? "🎉" : "📊"}</div>

        </Box>

          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {beautyResult.allNumbers.map((n, i) => (
              <div key={i} style={{ padding: "4px 8px", borderRadius: 6, fontSize: 12, fontWeight: 600, background: n === beautyResult.myNumber ? `${C.PURPLE}25` : `${C.DIM}15`, color: n === beautyResult.myNumber ? C.PURPLE : C.TEXT2 }}>{n}</div>

    if (isPlaying && nashSubmitted) return renderNashWait();

      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F2420)` }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ position: "fixed", top: 14, left: 14, background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer" }}>← Back</button>
        <div style={{ maxWidth: 420, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>⚖️</div>
          <h2 style={{ fontSize: 24, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>纳什均衡博弈</h2>
          <p style={{ fontSize: 14, color: C.TEAL, marginBottom: 20 }}>Nash Equilibrium Game · Week 4</p>

          {/* Role badge */}
          <div style={{ display: "inline-block", background: nashRole === "P1" ? `${C.AMBER}15` : `${C.TEAL}15`, border: `2px solid ${nashRole === "P1" ? C.AMBER : C.TEAL}50`, borderRadius: 12, padding: "12px 28px", marginBottom: 20 }}>
            <div style={{ fontSize: 11, color: C.DIM }}>你的角色 Your Role</div>

          {/* Player counts */}
          <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
            <div style={{ flex: 1, background: C.SURFACE, borderRadius: 10, padding: 10, textAlign: "center", border: `1px solid ${C.AMBER}20` }}>
              <div style={{ fontSize: 10, color: C.DIM }}>P1 行玩家</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: C.AMBER }}>{nashPlayerCounts.p1}</div>

            <div style={{ flex: 1, background: C.SURFACE, borderRadius: 10, padding: 10, textAlign: "center", border: `1px solid ${C.TEAL}20` }}>
              <div style={{ fontSize: 10, color: C.DIM }}>P2 列玩家</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: C.TEAL }}>{nashPlayerCounts.p2}</div>

            <div style={{ width: 40, height: 40, margin: "0 auto 8px", border: `3px solid ${C.DIM}30`, borderTopColor: C.TEAL, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 13, color: C.TEXT2 }}>等待老师开始第一轮...</div>
            <div style={{ fontSize: 11, color: C.DIM }}>Waiting for teacher to start Round 1...</div>
          </div>
        </div>
      </div>
    );
  }

  // ---- NASH PLAY (render function) ----
  function renderNashPlay() {
    const myStrats = nashRole === "P1" ? NASH.P1_STRATS : NASH.P2_STRATS;

    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F2420)` }}>
        <div style={{ maxWidth: 400, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 11, color: C.TEAL, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4 }}>

  // ---- NASH WAIT (after submitting, before round ends) ----
  function renderNashWait() {

      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F2420)` }}>

  // ---- NASH RESULT (after round ends) ----
  function renderNashResult() {
    const r = nashMyResult;
    // Also show round stats
    const rs = nashRoundStats;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F2420)`, overflowY: "auto" }}>
        <div style={{ maxWidth: 420, margin: "0 auto", textAlign: "center" }}>
          <div style={{ fontSize: 11, color: C.TEAL, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8 }}>Round {nashRound} Results</div>

          {r ? (
            <>
              {/* My match result */}
              <div className="fade-up" style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>你的选择 You</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: NASH.STRAT_COLORS[r.myChoice] || C.TEAL }}>{r.myChoice}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: C.GREEN, marginTop: 2 }}>+{r.myPayoff}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>对方 {r.oppName}</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: NASH.STRAT_COLORS[r.oppChoice] || C.TEXT }}>{r.oppChoice}</div>
                  <div style={{ fontSize: 20, fontWeight: 700, color: C.TEXT2, marginTop: 2 }}>+{r.oppPayoff}</div>
                </Box>
              </div>
            </>
          ) : (
            <div style={{ fontSize: 13, color: C.DIM, marginBottom: 16 }}>未匹配到结果 No match result</div>
          )}

          {/* Round stats */}
          {rs && (
            <Box className="fade-up fade-up-1" style={{ marginBottom: 16, textAlign: "left" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.TEAL, marginBottom: 10 }}>📊 本轮全班分布 Class Distribution</div>
              <div style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 11, color: C.AMBER, fontWeight: 600, marginBottom: 4 }}>P1 行玩家 ({rs.p1?.total || 0}人)</div>
                <div style={{ display: "flex", height: 24, borderRadius: 6, overflow: "hidden", background: `${C.DIM}15` }}>
                  {["U", "M", "D"].map(s => {
                    const cnt = rs.p1?.[s] || 0;
                    const pct = rs.p1?.total ? Math.round(cnt / rs.p1.total * 100) : 0;
                    return pct > 0 ? (
                      <div key={s} style={{ width: `${pct}%`, background: NASH.STRAT_COLORS[s], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: "#000", transition: "width 0.5s" }}>
                        {pct > 12 ? `${s} ${pct}%` : s}
                      </div>
                    ) : null;
                  })}
                </div>
              </div>
              <div>
                <div style={{ fontSize: 11, color: C.TEAL, fontWeight: 600, marginBottom: 4 }}>P2 列玩家 ({rs.p2?.total || 0}人)</div>
                <div style={{ display: "flex", height: 24, borderRadius: 6, overflow: "hidden", background: `${C.DIM}15` }}>
                  {["L", "R"].map(s => {
                    const cnt = rs.p2?.[s] || 0;
                    const pct = rs.p2?.total ? Math.round(cnt / rs.p2.total * 100) : 0;
                    return pct > 0 ? (
                      <div key={s} style={{ width: `${pct}%`, background: NASH.STRAT_COLORS[s], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: "#000", transition: "width 0.5s" }}>
                        {pct > 15 ? `${s} ${pct}%` : s}
                      </div>
                    ) : null;
                  })}
                </div>
              </div>
            </Box>
          )}

          {/* History */}
          {nashHistory.length > 0 && (
            <Box className="fade-up fade-up-2" style={{ marginBottom: 16, textAlign: "left" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.DIM, marginBottom: 8 }}>📈 你的历史 Your History</div>
              {nashHistory.map((h, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: i < nashHistory.length - 1 ? `1px solid ${C.DIM}15` : "none", fontSize: 12 }}>
                  <span style={{ color: C.DIM }}>R{h.round}</span>
                  <span style={{ color: C.TEXT2 }}>
                    <span style={{ color: NASH.STRAT_COLORS[h.myChoice], fontWeight: 700 }}>{h.myChoice}</span>
                    {" vs "}
                    <span style={{ color: NASH.STRAT_COLORS[h.oppChoice], fontWeight: 700 }}>{h.oppChoice}</span>
                  </span>
                  <span style={{ color: C.GREEN, fontWeight: 700 }}>+{h.myPayoff}</span>
                </div>
              ))}
            </Box>
          )}

          {/* Waiting for next round */}
          <div style={{ background: `${C.TEAL}08`, borderRadius: 10, padding: 12, border: `1px solid ${C.TEAL}20` }}>
            <div style={{ width: 30, height: 30, margin: "0 auto 8px", border: `2px solid ${C.DIM}30`, borderTopColor: C.TEAL, borderRadius: "50%", animation: "spin 1.2s linear infinite" }} />
            <div style={{ fontSize: 12, color: C.TEXT2 }}>等待老师开始下一轮... Waiting for next round...</div>
          </div>
        </div>
      </div>
    );
  }

  // ================================================================
  // TEACHER PANEL
  // ================================================================
  if (screen === "teacher") {
    const total = stats.alpha + stats.beta;
    const aR = total > 0 ? Math.round(stats.alpha / total * 100) : 0;
    const bR = total > 0 ? Math.round(stats.beta / total * 100) : 0;

    const [teacherTab, setTeacherTab] = useState("grade");

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
        <div style={{ maxWidth: 500, margin: "0 auto" }}>
          <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>🎓 教师面板 Teacher Panel</h2>

          {/* Tab switcher */}
          <div style={{ display: "flex", gap: 6, marginBottom: 20 }}>
            {[{ id: "grade", label: "📝 成绩", en: "Grade" }, { id: "beauty", label: "🏆 选美", en: "Beauty" }, { id: "nash", label: "⚖️ 纳什", en: "Nash" }].map(t => (
              <button key={t.id} className="btn-press" onClick={() => { setTeacherTab(t.id); if (t.id === "grade") loadStats(); if (t.id === "nash") loadNashAllStats(); }}
                style={{ flex: 1, padding: "10px 8px", fontSize: 13, fontWeight: 700, background: teacherTab === t.id ? `${C.GOLD}20` : "transparent", border: teacherTab === t.id ? `1px solid ${C.GOLD}50` : `1px solid ${C.DIM}25`, borderRadius: 10, color: teacherTab === t.id ? C.GOLD : C.DIM, cursor: "pointer" }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ---- GRADE TAB ---- */}
          {teacherTab === "grade" && (
            <div>
              <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}><div style={{ fontSize: 32, fontWeight: 800, color: C.ALPHA_C }}>{aR}%</div><div style={{ fontSize: 12, color: C.TEXT2 }}>α ({stats.alpha})</div></Box>
                <Box style={{ flex: 1, textAlign: "center" }}><div style={{ fontSize: 32, fontWeight: 800, color: C.BETA_C }}>{bR}%</div><div style={{ fontSize: 12, color: C.TEXT2 }}>β ({stats.beta})</div></Box>
              </div>
              <Box style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", height: 28, borderRadius: 8, overflow: "hidden", background: `${C.DIM}20` }}>
                  <div style={{ width: `${aR}%`, background: `linear-gradient(90deg, #3A7BD5, ${C.ALPHA_C})`, transition: "width 0.6s", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>{aR > 12 ? `α ${aR}%` : ""}</div>
                  <div style={{ width: `${bR}%`, background: `linear-gradient(90deg, #7B4FBF, ${C.BETA_C})`, transition: "width 0.6s", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>{bR > 12 ? `β ${bR}%` : ""}</div>
                </div>
              </Box>
              <Box style={{ background: `${C.GOLD}08`, border: `1px solid ${C.GOLD}20`, marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 6 }}>📖 对比 Polak (Yale 2007)</div>
                <div style={{ fontSize: 11, color: C.TEXT2, lineHeight: 1.6 }}>
                  耶鲁: ~85% α, ~15% β<br/><strong style={{ color: C.TEXT }}>你的课堂: {aR}% α, {bR}% β ({total}人)</strong>
                </div>
              </Box>
              {stats.results.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>最近结果 Recent ({stats.results.length})</div>
                  {stats.results.slice(0, 15).map((r, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${C.DIM}10`, fontSize: 12 }}>
                      <span style={{ color: C.TEXT }}>{r.player}</span>
                      <span style={{ color: r.choice === "α" ? C.ALPHA_C : C.BETA_C, fontWeight: 700 }}>{r.choice}</span>
                      <span style={{ color: r.payoff >= 0 ? C.GREEN : C.RED, fontWeight: 700 }}>{r.payoff > 0 ? "+" : ""}{r.payoff}</span>
                    </div>
                  ))}
                </Box>
              )}
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button className="btn-press" onClick={loadStats} style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>🔄 刷新</button>
                <button className="btn-press" onClick={async () => { const pw = prompt("Type 'reset':"); if (pw !== "reset") return; await db.ref(`games/${gameId}`).remove(); setStats({ alpha: 0, beta: 0, results: [] }); alert("✅ Reset!"); }}
                  style={{ flex: 1, padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>🗑️ 清除</button>
              </div>
            </div>
          )}

          {/* ---- BEAUTY TAB ---- */}
          {teacherTab === "beauty" && (
            <div>
              <Box style={{ marginBottom: 16, textAlign: "center" }}>
                <div style={{ fontSize: 10, color: C.DIM }}>已提交 Submissions</div>
                <div style={{ fontSize: 36, fontWeight: 800, color: C.PURPLE }}>{beautySubCount}</div>
              </Box>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn-press" onClick={revealBeautyResults}
                  style={{ flex: 1, padding: 12, fontSize: 13, fontWeight: 700, background: `linear-gradient(135deg, #4A3070, #2D1B4E)`, border: "none", borderRadius: 10, color: "white", cursor: "pointer", opacity: beautySubCount > 0 ? 1 : 0.4 }} disabled={beautySubCount === 0}>
                  🎉 揭晓结果
                </button>
                <button className="btn-press" onClick={resetBeautyContest}
                  style={{ padding: 12, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>
                  🗑️ 重置
                </button>
              </div>
            </div>
          )}

          {/* ---- NASH TAB ---- */}
          {teacherTab === "nash" && (
            <div>
              {/* Status */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>当前轮次 Round</div>
                  <div style={{ fontSize: 32, fontWeight: 800, color: C.TEAL }}>{nashRound || "—"}</div>
                </Box>
                <Box style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>阶段 Phase</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: nashPhase === "playing" ? C.GREEN : nashPhase === "results" ? C.GOLD : C.DIM, marginTop: 6 }}>
                    {nashPhase === "playing" ? "进行中 Playing" : nashPhase === "results" ? "已结束 Results" : "等待中 Lobby"}
                  </div>
                </Box>
              </div>

              {/* Player & submission counts */}
              <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.AMBER}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>P1 (行)</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.AMBER }}>{nashPlayerCounts.p1}</div>
                  {nashPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {nashSubCounts.p1}</div>}
                </Box>
                <Box style={{ flex: 1, textAlign: "center", border: `1px solid ${C.TEAL}20` }}>
                  <div style={{ fontSize: 10, color: C.DIM }}>P2 (列)</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: C.TEAL }}>{nashPlayerCounts.p2}</div>
                  {nashPhase === "playing" && <div style={{ fontSize: 10, color: C.GREEN }}>已交: {nashSubCounts.p2}</div>}
                </Box>
              </div>

              {/* Control buttons */}
              <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                {(nashPhase === "lobby" || nashPhase === "results") && (
                  <button className="btn-press" onClick={() => nashStartRound((nashRound || 0) + 1)}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, ${C.TEAL_DARK}, #0A1F1E)`, border: `1px solid ${C.TEAL}50`, borderRadius: 12, color: C.TEAL, cursor: "pointer" }}>
                    ▶️ {nashRound ? `开始第 ${nashRound + 1} 轮` : "开始第 1 轮"}
                  </button>
                )}
                {nashPhase === "playing" && (
                  <button className="btn-press" onClick={nashEndRound}
                    style={{ flex: 1, padding: 14, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #2A1A0F, #1A1008)`, border: `1px solid ${C.AMBER}50`, borderRadius: 12, color: C.AMBER, cursor: "pointer" }}>
                    ⏹️ 结束本轮 & 匹配
                  </button>
                )}
                <button className="btn-press" onClick={nashResetGame}
                  style={{ padding: 14, fontSize: 13, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 12, color: C.RED, cursor: "pointer" }}>
                  🗑️
                </button>
              </div>

              {/* Convergence chart */}
              <Box style={{ marginBottom: 16, border: `1px solid ${C.TEAL}20` }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.TEAL, marginBottom: 10 }}>📈 收敛趋势 Convergence to NE (U, R)</div>
                <ConvergenceChart allStats={nashAllStats} />
                <div style={{ fontSize: 10, color: C.DIM, marginTop: 6, textAlign: "center" }}>
                  NE预测: P1全选U, P2全选R → 两条线都趋向100%
                </div>
              </Box>

              {/* Per-round stats table */}
              {nashAllStats.length > 0 && (
                <Box>
                  <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>各轮数据 Round-by-round</div>
                  <table style={{ width: "100%", fontSize: 11, borderCollapse: "collapse" }}>
                    <thead>
                      <tr>
                        <td style={{ padding: 4, fontWeight: 700, color: C.DIM }}>R</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>U%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>M%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.AMBER }}>D%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>L%</td>
                        <td style={{ padding: 4, fontWeight: 700, color: C.TEAL }}>R%</td>
                      </tr>
                    </thead>
                    <tbody>
                      {nashAllStats.map((s, i) => {
                        const p1t = s.p1?.total || 1;
                        const p2t = s.p2?.total || 1;
                        return (
                          <tr key={i} style={{ borderTop: `1px solid ${C.DIM}15` }}>
                            <td style={{ padding: 4, color: C.TEXT }}>{s.round}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.U || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.M || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p1?.D || 0) / p1t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p2?.L || 0) / p2t * 100)}</td>
                            <td style={{ padding: 4, color: C.TEXT2 }}>{Math.round((s.p2?.R || 0) / p2t * 100)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </Box>
              )}

              <button className="btn-press" onClick={loadNashAllStats} style={{ width: "100%", padding: 10, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer", marginTop: 12 }}>
                🔄 刷新数据 Refresh
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ---- HISTORY ----
  if (screen === "history") return (
    <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>📊 历史记录 History</h2>
        {stats.results.length === 0 ? (
          <p style={{ color: C.DIM, fontSize: 13 }}>还没有记录。</p>
        ) : stats.results.map((r, i) => (
          <Box key={i} style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.TEXT }}>{r.player}</div>
              <div style={{ fontSize: 10, color: C.DIM }}>{r.choice} vs {r.opponent}({r.oppChoice})</div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: r.payoff >= 0 ? C.GREEN : C.RED }}>{r.payoff > 0 ? "+" : ""}{r.payoff}</div>
          </Box>
        ))}
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById("app"));
</script>
</body>
</html>
