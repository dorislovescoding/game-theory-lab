// AI — Claude via Anthropic API
async function getClaudeChoice(game, history) {
  try {
    const historyStr = history.length > 0
      ? "Previous rounds: " + history.map((h, i) => `Round ${i+1}: human=${h.mine}, AI=${h.opp}`).join("; ")
      : "This is the first round.";

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `You are playing a game theory game called "${game.name}" against a human student.
Available strategies: ${game.strategies.join(", ")}

OUTCOME matrix (grades, NOT payoffs):
  α,α → B−, B−
  α,β → A, C  
  β,α → C, A
  β,β → B+, B+

IMPORTANT: These are OUTCOMES (grades), not payoffs. The payoffs depend on PREFERENCES. 
- If you are a "selfish" player (evil git) who only cares about your own grade: A=3, B+=1, B−=0, C=−1 → α is dominant.
- If you are an "indignant angel" who feels guilt getting A while partner gets C, or anger getting C while partner gets A → the game changes completely, and there may be no dominant strategy.
- The game theory lesson here is: the same outcomes + different preferences = completely different games.

${historyStr}

You must decide what kind of player you are and choose accordingly. Be creative — maybe you're selfish, maybe you care about fairness, maybe you're vengeful. Your personality can evolve across rounds.

Respond in EXACTLY this JSON format, nothing else:
{"choice":"α or β","reasoning_cn":"2-4句中文。先说明你的偏好/性格（你在乎什么），然后解释这如何影响你的策略选择。引用博弈论概念。","reasoning_en":"2-4 sentences in English. First state your preferences/personality, then explain how this affects your strategy. Reference game theory concepts."}`
        }]
      })
    });
    const data = await response.json();
    const text = (data.content?.[0]?.text || "").trim();
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (game.strategies.includes(parsed.choice)) {
        return { choice: parsed.choice, reasoningCN: parsed.reasoning_cn, reasoningEN: parsed.reasoning_en };
      }
    } catch {}
    // Fallback: try to find strategy in raw text
    for (const s of game.strategies) {
      if (text.includes(s)) return { choice: s, reasoningCN: "AI选择了策略 " + s, reasoningEN: "AI chose strategy " + s };
    }
    return { choice: game.strategies[0], reasoningCN: "（分析不可用）", reasoningEN: "(Analysis unavailable)" };
  } catch (e) {
    console.error("Claude API error:", e);
    const fallback = game.strategies[Math.floor(Math.random() * game.strategies.length)];
    return { choice: fallback, reasoningCN: "（API连接失败，随机选择）", reasoningEN: "(API connection failed, random choice)" };
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// ================================================================
// APP COMPONENT
// ================================================================
function App() {
  const [screen, setScreen] = useState("home"); // home | intro | play | result | history | teacher | beauty_intro | beauty_play | beauty_wait | beauty_result
  const [gameId, setGameId] = useState("grade_game");
  const [name, setName] = useState(() => {
    try { return localStorage.getItem("gt_name") || ""; } catch { return ""; }
  });
  const [studentId, setStudentId] = useState(() => {
    try { return localStorage.getItem("gt_sid") || ""; } catch { return ""; }
  });
  const [sessionCode, setSessionCode] = useState("");
  const [section, setSection] = useState("");
  const [mode, setMode] = useState("human");
  const [aiType, setAiType] = useState("random");
  const [waiting, setWaiting] = useState(false);
  const [choice, setChoice] = useState(null);
  const [result, setResult] = useState(null);
  const [showMatrix, setShowMatrix] = useState(false);
  const [aiHistory, setAiHistory] = useState([]);
  const [stats, setStats] = useState({ alpha: 0, beta: 0, results: [] });
  const [waitDots, setWaitDots] = useState("");

  const game = GAMES[gameId];
  const myId = useRef(generateId());
  const listenersRef = useRef([]);

  // Save name & student ID
  useEffect(() => {
    try { if (name) localStorage.setItem("gt_name", name); } catch {}
  }, [name]);
  useEffect(() => {
    try { if (studentId) localStorage.setItem("gt_sid", studentId); } catch {}
  }, [studentId]);

  // Waiting dots animation
  useEffect(() => {
    if (!waiting) return;
    const iv = setInterval(() => setWaitDots(d => d.length >= 3 ? "" : d + "."), 500);
    return () => clearInterval(iv);
  }, [waiting]);

  // Cleanup firebase listeners on unmount
  useEffect(() => {
    return () => listenersRef.current.forEach(off => off());
  }, []);

  // ---- HUMAN MATCHING via Firebase (Batch mode) ----
  // Students submit, wait for matching window, then get randomly paired
  const [countdown, setCountdown] = useState(0);

  const submitHuman = async (myChoice) => {
    if (!firebaseReady) {
      alert("Firebase 未配置！请按照说明设置 Firebase。\nFirebase not configured! Follow setup instructions.");
      return;
    }
    setChoice(myChoice);
    setWaiting(true);

    // Submit to pending pool
    const myRef = db.ref(`games/${gameId}/pending/${myId.current}`);
    await myRef.set({
      name: name || "匿名",
      studentId: studentId || "",
      choice: myChoice,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    });

    // Start countdown (30 seconds)
    let timeLeft = 30;
    setCountdown(timeLeft);
    const timer = setInterval(() => {
      timeLeft--;
      setCountdown(timeLeft);
      if (timeLeft <= 0) clearInterval(timer);
    }, 1000);

    // Only start listening for match AFTER 30 seconds
    // This ensures everyone waits the full countdown
    setTimeout(() => {
      const matchRef = db.ref(`games/${gameId}/matches/${myId.current}`);
      const onMatch = matchRef.on("value", (snap) => {
        const match = snap.val();
        if (!match) return;
        matchRef.off("value", onMatch);
        const key = `${myChoice},${match.opponentChoice}`;
        const po = game.payoffs[key];
        const res = {
          myChoice, oppChoice: match.opponentChoice,
          oppName: match.opponentName,
          label: po.label, myPay: po.p1, oppPay: po.p2, key,
        };
        setResult(res);
        setWaiting(false);
        setCountdown(0);
        setScreen("result");

        // Record to results log
        db.ref(`games/${gameId}/results`).push({
          player: name || "匿名", studentId: studentId || "",
          choice: myChoice,
          opponent: match.opponentName, oppChoice: match.opponentChoice,
          payoff: po.p1, timestamp: firebase.database.ServerValue.TIMESTAMP,
        });
      });
      listenersRef.current.push(() => matchRef.off("value", onMatch));
    }, 30000);

    // After 30 seconds, try to match everyone
    setTimeout(async () => {
      // Check if already matched
      const myMatchSnap = await db.ref(`games/${gameId}/matches/${myId.current}`).once("value");
      if (myMatchSnap.val()) return; // Already matched

      // Read all pending submissions
      const snap = await db.ref(`games/${gameId}/pending`).once("value");
      const pending = snap.val();
      if (!pending) {
        matchRef.off("value", onMatch);
        setWaiting(false);
        setCountdown(0);
        alert("没有其他人提交，请稍后重试。\nNo other submissions. Please try again.");
        setScreen("play");
        setChoice(null);
        return;
      }

      // Get all other players
      const others = Object.entries(pending).filter(([id]) => id !== myId.current);

      if (others.length === 0) {
        matchRef.off("value", onMatch);
        myRef.remove();
        setWaiting(false);
        setCountdown(0);
        alert("没有找到对手，请等其他同学也提交后重试。\nNo opponent found. Wait for classmates to submit and try again.");
        setScreen("play");
        setChoice(null);
        return;
      }

      // Pick a random opponent (with replacement — don't remove them from pending)
      // This way odd-numbered students still get matched
      const randomIdx = Math.floor(Math.random() * others.length);
      const [oppId, oppData] = others[randomIdx];

      // Create match — only remove SELF from pending, not opponent
      // Opponent stays available for other unmatched students
      const updates = {};
      updates[`games/${gameId}/pending/${myId.current}`] = null;
      updates[`games/${gameId}/matches/${myId.current}`] = {
        opponentChoice: oppData.choice,
        opponentName: oppData.name,
      };

      // Also try to match the opponent with us (if they haven't been matched yet)
      const oppMatchSnap = await db.ref(`games/${gameId}/matches/${oppId}`).once("value");
      if (!oppMatchSnap.val()) {
        updates[`games/${gameId}/pending/${oppId}`] = null;
        updates[`games/${gameId}/matches/${oppId}`] = {
          opponentChoice: myChoice,
          opponentName: name || "匿名",
        };
      }

      try {
        await db.ref().update(updates);
      } catch (e) {
        console.log("Match conflict, retrying...");
      }
    }, 30000);
  };

  // ---- AI PLAY ----
  const submitAI = async (myChoice) => {
    setChoice(myChoice);
    setWaiting(true);
    const aiResult = await getClaudeChoice(game, aiHistory);
    const key = `${myChoice},${aiResult.choice}`;
    const po = game.payoffs[key];
    const res = {
      myChoice, oppChoice: aiResult.choice,
      oppName: "Claude AI",
      label: po.label, myPay: po.p1, oppPay: po.p2, key,
      aiReasoningCN: aiResult.reasoningCN,
      aiReasoningEN: aiResult.reasoningEN,
    };
    setAiHistory(prev => [...prev, { mine: myChoice, opp: aiResult.choice }]);
    setResult(res);
    setWaiting(false);
    setScreen("result");
  };

  const handleChoice = (c) => {
    if (mode === "ai") submitAI(c);
    else submitHuman(c);
  };

  const playAgain = () => {
    myId.current = generateId();
    setChoice(null); setResult(null); setScreen("play");
  };

  // ---- TEACHER STATS ----
  const loadStats = () => {
    if (!firebaseReady) {
      setStats({ alpha: 0, beta: 0, results: [] });
      return;
    }
    db.ref(`games/${gameId}/results`).orderByChild("timestamp").limitToLast(200)
      .once("value", (snap) => {
        const data = snap.val() || {};
        const results = Object.values(data).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        const alpha = results.filter(r => r.choice === "α").length;
        const beta = results.filter(r => r.choice === "β").length;
        setStats({ alpha, beta, results });
      });
  };

  // ================================================================
  // RENDER HELPERS
  // ================================================================
  const Box = ({ children, style, ...props }) => (
    <div style={{ background: C.SURFACE, borderRadius: 14, padding: 16, border: `1px solid ${C.HEADER}25`, ...style }} {...props}>
      {children}
    </div>
  );

  const Btn = ({ children, primary, style, ...props }) => (
    <button className="btn-press" style={{
      padding: "14px 20px", fontSize: 15, fontWeight: 700, border: "none",
      borderRadius: 12, cursor: "pointer", width: "100%",
      background: primary ? `linear-gradient(135deg, ${C.HEADER}, ${C.BLUE})` : "transparent",
      color: primary ? "white" : C.TEXT2,
      border: primary ? "none" : `1px solid ${C.DIM}40`,
      ...style,
    }} {...props}>{children}</button>
  );

  // ================================================================
  // SCREENS
  // ================================================================

  // ---- HOME ----
  if (screen === "home") return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG} 0%, #0F1A30 50%, #141E35 100%)` }}>
      <div style={{ position: "absolute", inset: 0, backgroundImage: `linear-gradient(${C.HEADER}08 1px, transparent 1px), linear-gradient(90deg, ${C.HEADER}08 1px, transparent 1px)`, backgroundSize: "40px 40px", pointerEvents: "none" }} />

      <div className="fade-up" style={{ position: "relative", zIndex: 1, textAlign: "center", maxWidth: 400, width: "100%" }}>
        <div style={{ width: 60, height: 60, margin: "0 auto 16px", background: `linear-gradient(135deg, ${C.RED}, ${C.GOLD})`, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, fontWeight: 800, color: "white", boxShadow: `0 8px 32px ${C.RED}40` }}>
          GT
        </div>

        <h1 style={{ fontSize: 28, fontWeight: 800, color: C.TEXT, letterSpacing: "-0.02em" }}>Game Theory Lab</h1>
        <p style={{ fontSize: 13, color: C.GOLD, letterSpacing: "0.15em", textTransform: "uppercase", fontWeight: 600, margin: "4px 0 0" }}>
          ECON2501 · 博弈论实验室
        </p>
        <p style={{ fontSize: 12, color: C.DIM, margin: "8px 0 28px" }}></p>

        {!firebaseReady && (
          <div style={{ background: `${C.RED}15`, border: `1px solid ${C.RED}40`, borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 12, color: "#FF8A80", textAlign: "left" }}>
            ⚠️ Firebase 未配置。人人对战模式不可用。<br/>请按 index.html 顶部说明配置 Firebase。<br/>AI 对战模式可正常使用。
          </div>
        )}

        <input type="text" placeholder="你的名字 / Your name" value={name}
          onChange={e => setName(e.target.value)}
          style={{ width: "100%", padding: "13px 16px", fontSize: 15, background: C.SURFACE, border: `1px solid ${C.HEADER}40`, borderRadius: 11, color: C.TEXT, outline: "none", marginBottom: 10 }}
          onFocus={e => e.target.style.borderColor = C.GOLD}
          onBlur={e => e.target.style.borderColor = `${C.HEADER}40`}
        />
        <input type="text" placeholder="学号 / Student ID" value={studentId}
          onChange={e => setStudentId(e.target.value)}
          style={{ width: "100%", padding: "13px 16px", fontSize: 15, background: C.SURFACE, border: `1px solid ${C.HEADER}40`, borderRadius: 11, color: C.TEXT, outline: "none", marginBottom: 16 }}
          onFocus={e => e.target.style.borderColor = C.GOLD}
          onBlur={e => e.target.style.borderColor = `${C.HEADER}40`}
        />

        <div style={{ marginBottom: 12, display: "flex", gap: 10 }}>
          <button className="btn-press" onClick={() => {
            if (!name.trim() || !studentId.trim()) { alert("请填写姓名和学号\nPlease fill in name and student ID"); return; }

    const num = parseInt(beautyNumber);
    if (isNaN(num) || num < 0 || num > 100) { alert("请输入0-100的整数\nPlease enter an integer from 0 to 100"); return; }
    if (!firebaseReady) return;

    await db.ref("games/beauty_contest/submissions/" + myId.current).set({
      name: name || "匿名", studentId: studentId || "", number: num,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
    });

    setScreen("beauty_wait");

    // Countdown
    let t = 30;
    setBeautyCountdown(t);
    const timer = setInterval(() => { t--; setBeautyCountdown(t); if (t <= 0) clearInterval(timer); }, 1000);

    // After 30s, compute results
    setTimeout(async () => {
      const snap = await db.ref("games/beauty_contest/submissions").once("value");
      const subs = snap.val();
      if (!subs) return;
      const entries = Object.values(subs);
      const numbers = entries.map(e => e.number);
      const avg = numbers.reduce((a, b) => a + b, 0) / numbers.length;
      const target = (2 / 3) * avg;
      let closest = entries[0];
      let minDist = Math.abs(entries[0].number - target);
      entries.forEach(e => {
        const dist = Math.abs(e.number - target);
        if (dist < minDist) { minDist = dist; closest = e; }
      });

      setBeautyResult({
        myNumber: num, avg: avg.toFixed(1), target: target.toFixed(1),
        totalPlayers: entries.length, winner: closest.name, winnerNumber: closest.number,
        isWinner: closest.studentId === studentId,
        allNumbers: numbers.sort((a, b) => a - b),
      });
      setScreen("beauty_result");
    }, 30000);

          style={{ width: "100%", padding: "20px 16px", fontSize: 32, fontWeight: 800, background: C.SURFACE, border: `2px solid ${C.PURPLE}50`, borderRadius: 14, color: C.TEXT, outline: "none", textAlign: "center", marginBottom: 16 }}
          onFocus={e => e.target.style.borderColor = C.PURPLE}
          onBlur={e => e.target.style.borderColor = `${C.PURPLE}50`}
        />

        <button className="btn-press" onClick={submitBeauty}
          style={{ width: "100%", padding: 16, fontSize: 16, fontWeight: 700, background: `linear-gradient(135deg, #4A3070, #2D1B4E)`, border: "none", borderRadius: 12, color: "white", cursor: "pointer" }}>
          提交 Submit
        </button>
      </div>
    </div>
  );

  if (screen === "beauty_wait") return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A1035)` }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ position: "relative", width: 90, height: 90, margin: "0 auto 18px" }}>
          <svg width="90" height="90" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="45" cy="45" r="38" fill="none" stroke={`${C.DIM}25`} strokeWidth="4" />
            <circle cx="45" cy="45" r="38" fill="none" stroke={C.PURPLE} strokeWidth="4"
              strokeDasharray={`${2 * Math.PI * 38}`}
              strokeDashoffset={`${2 * Math.PI * 38 * (1 - beautyCountdown / 30)}`}
              strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 800, color: C.PURPLE }}>
            {beautyCountdown}
          </div>
        </div>

        <h2 style={{ fontSize: 18, color: C.TEXT, marginBottom: 6 }}>等待同学们提交... Waiting for classmates...</h2>
        <p style={{ fontSize: 12, color: C.DIM }}>
          {beautyCountdown > 0 ? `${beautyCountdown} 秒后揭晓 / Results in ${beautyCountdown}s` : "正在计算... Calculating..."}
        </p>
        <p style={{ fontSize: 16, color: C.PURPLE, marginTop: 14, fontWeight: 700 }}>
          你选了 You chose: <span style={{ fontSize: 28, color: C.TEXT }}>{beautyNumber}</span>
        </p>
        <p style={{ fontSize: 11, color: C.DIM, marginTop: 6 }}>✓ 已提交 Submitted</p>
      </div>
    </div>
  );

  if (screen === "beauty_result" && beautyResult) return (
    <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #1A1035)` }}>
      <div style={{ maxWidth: 460, margin: "0 auto", textAlign: "center" }}>
        <div style={{ fontSize: 42, marginBottom: 8 }}>{beautyResult.isWinner ? "🎉" : "📊"}</div>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 4 }}>
          {beautyResult.isWinner ? "你赢了！You Won!" : "Results 结果"}
        </h2>

        <div style={{ display: "flex", gap: 10, marginTop: 16, marginBottom: 16 }}>
          <div style={{ flex: 1, background: C.SURFACE, borderRadius: 12, padding: 14, border: `1px solid ${C.DIM}20` }}>
            <div style={{ fontSize: 10, color: C.DIM }}>参与人数 Players</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: C.TEXT }}>{beautyResult.totalPlayers}</div>
          </div>
          <div style={{ flex: 1, background: C.SURFACE, borderRadius: 12, padding: 14, border: `1px solid ${C.DIM}20` }}>
            <div style={{ fontSize: 10, color: C.DIM }}>平均值 Average</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: C.GOLD }}>{beautyResult.avg}</div>
          </div>
          <div style={{ flex: 1, background: C.SURFACE, borderRadius: 12, padding: 14, border: `1px solid ${C.PURPLE}30` }}>
            <div style={{ fontSize: 10, color: C.DIM }}>目标 2/3 × avg</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: C.PURPLE }}>{beautyResult.target}</div>
          </div>
        </div>

        <div style={{ background: C.SURFACE, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${C.GOLD}30`, textAlign: "left" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 6 }}>🏆 Winner 获胜者</div>
          <div style={{ fontSize: 16, color: C.TEXT }}>{beautyResult.winner} — chose <strong style={{ color: C.PURPLE }}>{beautyResult.winnerNumber}</strong></div>
          <div style={{ fontSize: 12, color: C.DIM, marginTop: 2 }}>Closest to {beautyResult.target}</div>
        </div>

        <div style={{ background: C.SURFACE, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${C.DIM}20`, textAlign: "left" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.TEXT2, marginBottom: 6 }}>你的选择 Your choice</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: C.PURPLE }}>{beautyResult.myNumber}
            <span style={{ fontSize: 13, color: C.DIM, fontWeight: 400 }}> — distance from target: {Math.abs(beautyResult.myNumber - parseFloat(beautyResult.target)).toFixed(1)}</span>
          </div>
        </div>

        <div style={{ background: C.SURFACE, borderRadius: 12, padding: 14, marginBottom: 14, border: `1px solid ${C.DIM}20`, textAlign: "left" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.TEXT2, marginBottom: 8 }}>所有提交 All submissions (sorted)</div>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {beautyResult.allNumbers.map((n, i) => (
              <div key={i} style={{
                padding: "4px 8px", borderRadius: 6, fontSize: 12, fontWeight: 600,
                background: n === beautyResult.myNumber ? `${C.PURPLE}25` : n === beautyResult.winnerNumber ? `${C.GOLD}20` : `${C.DIM}15`,
                color: n === beautyResult.myNumber ? C.PURPLE : n === beautyResult.winnerNumber ? C.GOLD : C.TEXT2,
                border: n === beautyResult.winnerNumber ? `1px solid ${C.GOLD}50` : "1px solid transparent",
              }}>{n}</div>
            ))}
          </div>
        </div>

        <div style={{ background: `${C.GOLD}0C`, borderRadius: 12, padding: 12, marginBottom: 14, border: `1px solid ${C.GOLD}25`, textAlign: "left" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 4 }}>💡 Think about it 想一想</div>
          <div style={{ fontSize: 12, color: C.TEXT2, lineHeight: 1.6 }}>
            如果每个人都是"理性的"，正确答案应该是什么？我们下周学完迭代消除后再来分析！<br/>
            <span style={{ color: C.DIM }}>If everyone were "rational", what should the answer be? We'll analyze this formally next week after learning IESDS!</span>
          </div>
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button className="btn-press" onClick={() => { setBeautyNumber(""); setBeautyResult(null); setScreen("beauty_play"); }}
            style={{ flex: 1, padding: 13, fontSize: 14, fontWeight: 700, background: `linear-gradient(135deg, #4A3070, #2D1B4E)`, border: "none", borderRadius: 12, color: "white", cursor: "pointer" }}>
            再来一轮 Play Again
          </button>
          <button className="btn-press" onClick={() => { setBeautyNumber(""); setBeautyResult(null); setScreen("home"); }}
            style={{ flex: 1, padding: 13, fontSize: 14, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 12, color: C.TEXT2, cursor: "pointer" }}>
            返回首页 Home
          </button>
        </div>
      </div>
    </div>
  );

  // ---- TEACHER ----
  if (screen === "teacher") {
    const total = stats.alpha + stats.beta;
    const aR = total > 0 ? Math.round(stats.alpha / total * 100) : 0;
    const bR = total > 0 ? Math.round(stats.beta / total * 100) : 0;

    return (
      <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
        <div style={{ maxWidth: 460, margin: "0 auto" }}>
          <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>

          <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 2 }}>🎓 教师面板 Teacher Panel</h2>
          <p style={{ fontSize: 12, color: C.TEXT2, marginBottom: 20 }}>{game.nameCN} · 实时课堂统计 Live Stats</p>

          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 32, fontWeight: 800, color: C.ALPHA_C }}>{aR}%</div>
              <div style={{ fontSize: 12, color: C.TEXT2 }}>Chose α 选择 α</div>
              <div style={{ fontSize: 10, color: C.DIM }}>{stats.alpha}/{total} 人</div>
            </Box>
            <Box style={{ flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 32, fontWeight: 800, color: C.BETA_C }}>{bR}%</div>
              <div style={{ fontSize: 12, color: C.TEXT2 }}>Chose β 选择 β</div>
              <div style={{ fontSize: 10, color: C.DIM }}>{stats.beta}/{total} 人</div>
            </Box>
          </div>

          {/* Bar */}
          <Box style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: C.DIM, marginBottom: 6 }}>策略分布 Distribution</div>
            <div style={{ display: "flex", height: 28, borderRadius: 8, overflow: "hidden", background: `${C.DIM}20` }}>
              <div style={{ width: `${aR}%`, background: `linear-gradient(90deg, #3A7BD5, ${C.ALPHA_C})`, transition: "width 0.6s ease", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>
                {aR > 12 ? `α ${aR}%` : ""}
              </div>
              <div style={{ width: `${bR}%`, background: `linear-gradient(90deg, #7B4FBF, ${C.BETA_C})`, transition: "width 0.6s ease", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "white" }}>
                {bR > 12 ? `β ${bR}%` : ""}
              </div>
            </div>
          </Box>

          {/* Polak comparison */}
          <Box style={{ background: `${C.GOLD}08`, border: `1px solid ${C.GOLD}20`, marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.GOLD, marginBottom: 6 }}>📖 对比 Polak (Yale 2007) Comparison</div>
            <div style={{ fontSize: 11, color: C.TEXT2, lineHeight: 1.6 }}>
              耶鲁课堂 Yale: ~85% chose α, ~15% chose β<br/>
              普通人实验 General public: ~70% chose α, ~30% chose β<br/><br/>
              <strong style={{ color: C.TEXT }}>你的课堂 Your class: {aR}% α, {bR}% β ({total} students)</strong><br/>
              {total === 0 ? "还没有数据 No data yet — start the game!" :
               aR > 75 ? "和耶鲁学生差不多！Similar to Yale — most chose the dominant strategy (under selfish preferences)" :
               bR > 50 ? "你的学生更倾向合作 Your students prefer cooperation — interesting! Why?" :
               "有趣的分布！Interesting — great for class discussion."}
            </div>
          </Box>

          {/* Recent results */}
          {stats.results.length > 0 && (
            <Box>
              <div style={{ fontSize: 11, color: C.DIM, marginBottom: 8 }}>最近结果 Recent Results（含学号和验证码）</div>
              {stats.results.slice(0, 20).map((r, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: i < 19 ? `1px solid ${C.DIM}15` : "none", fontSize: 12 }}>
                  <div style={{ flex: 1 }}>
                    <span style={{ color: C.TEXT, fontWeight: 600 }}>{r.player}</span>
                    {r.studentId && <span style={{ color: C.DIM, fontSize: 10, marginLeft: 6 }}>{r.studentId}</span>}
                    {r.section && <span style={{ color: C.ALPHA_C, fontSize: 9, marginLeft: 4, background: `${C.ALPHA_C}15`, padding: "1px 5px", borderRadius: 3 }}>{r.section}</span>}
                    {r.sessionCode && <span style={{ color: C.GOLD, fontSize: 9, marginLeft: 4, background: `${C.GOLD}15`, padding: "1px 5px", borderRadius: 3 }}>{r.sessionCode}</span>}
                  </div>
                  <span style={{ color: C.TEXT2, marginRight: 8 }}>
                    <span style={{ color: r.choice === "α" ? C.ALPHA_C : C.BETA_C, fontWeight: 700 }}>{r.choice}</span>
                    {" vs "}
                    <span style={{ color: r.oppChoice === "α" ? C.ALPHA_C : C.BETA_C, fontWeight: 700 }}>{r.oppChoice}</span>
                  </span>
                  <span style={{ color: r.payoff >= 0 ? C.GREEN : C.RED, fontWeight: 700, minWidth: 28, textAlign: "right" }}>
                    {r.payoff > 0 ? "+" : ""}{r.payoff}
                  </span>
                </div>
              ))}
            </Box>
          )}

          <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
            <button className="btn-press" onClick={loadStats}
              style={{ flex: 1, padding: 11, fontSize: 12, background: "transparent", border: `1px solid ${C.DIM}30`, borderRadius: 10, color: C.TEXT2, cursor: "pointer" }}>
              🔄 刷新 Refresh
            </button>
            <button className="btn-press" onClick={async () => {
              if (!firebaseReady) return;
              const pw = prompt("确认清除所有数据？输入 reset 确认\nClear all data? Type 'reset' to confirm:");
              if (pw !== "reset") return;
              await db.ref(`games/${gameId}`).remove();
              await db.ref("games/beauty_contest").remove();
              setStats({ alpha: 0, beta: 0, results: [] });
              alert("✅ 所有数据已清除（成绩博弈+选美博弈）\nAll data cleared (Grade Game + Beauty Contest)");
            }}
              style={{ flex: 1, padding: 11, fontSize: 12, background: "transparent", border: `1px solid ${C.RED}40`, borderRadius: 10, color: C.RED, cursor: "pointer" }}>
              🗑️ 清除 Reset All
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---- HISTORY ----
  if (screen === "history") return (
    <div style={{ minHeight: "100vh", padding: 24, background: `linear-gradient(165deg, ${C.BG}, #0F1A30)` }}>
      <div style={{ maxWidth: 460, margin: "0 auto" }}>
        <button className="btn-press" onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.TEXT2, fontSize: 13, cursor: "pointer", marginBottom: 14 }}>← 返回</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, color: C.TEXT, marginBottom: 16 }}>📊 历史记录 History</h2>
        {stats.results.length === 0 ? (
          <p style={{ color: C.DIM, fontSize: 13 }}>还没有记录。去玩一局吧！No records yet — go play!</p>
        ) : stats.results.map((r, i) => (
          <Box key={i} style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.TEXT }}>{r.player}</div>
              <div style={{ fontSize: 10, color: C.DIM }}>
                {r.choice} vs {r.opponent}({r.oppChoice})
              </div>
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: r.payoff >= 0 ? C.GREEN : C.RED }}>
              {r.payoff > 0 ? "+" : ""}{r.payoff}
            </div>
          </Box>
        ))}
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById("app"));
</script>
</body>
</html>
